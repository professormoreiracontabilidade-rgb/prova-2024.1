matéria-prima. A questão fala sobre benefícios\nperdidos entre alternativas, não sobre custos que podem ser controlados por decisões gerenciais. Desse modo, a\nalternativa de fato está incorreta.\n(B) Custo de Oportunidade.\nAlternativa correta. O custo de oportunidade representa o valor da melhor alternativa não escolhida quando se\ntoma uma decisão. É o benefício que poderia ter sido obtido se outro caminho fosse seguido. Por exemplo, se você\ndecide investir R$ 10.000,00 em um negócio que rende 5% ao ano, o custo de oportunidade é o rendimento que\nvocê deixou de ganhar ao não aplicar esse dinheiro em uma poupança (digamos 3% ao ano). Esse entendimento\né crucial para avaliar trade-offs (escolhas entre alternativas) e alocação eficiente de recursos.\n(C) Custo Perdido.\nAlternativa incorreta. Custos perdidos são custos já incorridos e irreversíveis, que não devem influenciar decisões\nfuturas, por exemplo, dinheiro gasto em um projeto falido. A questão não menciona custos irrelevantes para\ndecisões futuras, mas, sim, o valor da melhor alternativa não escolhida.\n(D) Custos Imputados.\nAlternativa incorreta. Custos imputados são custos hipotéticos atribuídos a recursos que não têm um gasto\nmonetário explícito, por exemplo, o salário que um empresário \"deixaria de ganhar\" ao trabalhar em seu próprio\nnegócio. Embora relacionado a oportunidades, o termo é mais específico e não se encaixa perfeitamente na\ndefinição dada, que é mais ampla e abrange qualquer escolha entre alternativas.\nGabarito: B", "g": "B"}, {"n": 40, "q": "40.\t (FGV/Exame de Suficiência/2024.1) A Sociedade Empresária Alegria Alegria Ltda. apresentou o\nseguinte Balanço Patrimonial em 31/12/20X1:\nA partir dos dados apresentados é correto afirmar que\nA)\t o percentual dos ativos financiados por capital de terceiros corresponde a 8,19% em 20X1.\nB)\t a liquidez corrente em 20X1 é 111.000,00 e em 20X0 é -68.000,00.\nC)\t a empresa não tem capacidade de pagamento a curto prazo em 20X0 e em 20X1, sem considerar os seus\nestoques.\nD)\t a empresa possui mais que 50% dos seus recursos aplicados no ativo não circulante em 20X0.", "c": "(A) o percentual dos ativos financiados por capital de terceiros corresponde a 8,19% em 20X1.\nO Índice de Endividamento Total indica a porcentagem que o endividamento representa sobre os recursos totais.\nSignifica também qual é a porcentagem do ativo total financiada com recursos de terceiros.\nA fórmula é a seguinte:\nET =\nExigível total\nAtivo total\nPassivo Circulante + Passivo Não Circulante\nAtivo Circulante + Ativo Não Circulante\n=\nET 20X1 =\n34.000+179.000\n145.000+270.000\n213.000\n415.000\n0,51 ou 51%\n=\n=\nEsse resultado demonstra que somente 51% dos ativos são financiados com capital de terceiros. Ou seja, 51% do\nativo total é financiado com recursos de terceiros e 49% do ativo total com recursos próprios.\nAlternativa errada.\n(B) a liquidez corrente em 20X1 é 111.000,00 e em 20X0 é -68.000,00.\nO Índice de Liquidez Corrente (também conhecido como Liquidez Comum) mede a capacidade da empresa de\npagar suas dívidas de curto prazo (passivo circulante) com os recursos de curto prazo (ativo circulante). É um\níndice muito utilizado e considerado como o melhor indicador da situação de liquidez da empresa.\nSua fórmula é a seguinte:\nLC 20X1 =\nAtivo Circulante\nPassivo Circulante\nLC 20X1 =\n145.000\n34.000\n= 4,26\n= 4,26\nLC 20X0 =\n290.000\n68.000\nAlternativa errada.\n(C) a empresa não tem capacidade de pagamento a curto prazo em 20X0 e em 20X1, sem considerar os seus\nestoques.\nO Índice de Liquidez Seca (também conhecido como Acid Test ou Teste Ácido) é mais adequado para as empresas\nque operam com estoques de difícil realização financeira, geralmente em função do alto valor. Como exemplo,\npodemos citar as empresas do setor imobiliário, em que a venda do estoque costuma ser mais lenta.\nSua fórmula é a seguinte:\nLS =\nAtivo Circulante - Estoques\nPassivo Circulante\nLS 20X1 =\n145.000 - 80.000\n34.000\n65.000\n34.000\n= 1,91\n=\nLS 20X0 =\n290.000 - 160.000\n68.000\n130.000\n68.000\n= 1,91\n=\nSignifica que a empresa possui R$1,91, no ativo circulante para cada real de dívida de curto prazo, sem considerar\nos estoques. Alternativa errada.\nD) a empresa possui mais que 50% dos seus recursos aplicados no ativo não circulante em 20X0.\nA Análise Vertical indica a estrutura das demonstrações contábeis, por meio de coeficientes de participações,\nbem como sua evolução no tempo.\nNo balanço patrimonial, os coeficientes são calculados em função do total do Ativo e total do Passivo + PL.\nPara o Ativo Não Circulante, fica assim:\nA.V. 20x0 =\n=\n=\nAtivo Não Circulante\nAtivo total\n540.000\n830.00\n65%\nPortanto, a entidade possui mais do que 50% de seus recursos aplicados no ativo não circulante em 20X0. Esse é\nnosso gabarito.\nGabarito: D", "g": "D"}, {"n": 41, "q": "41.\t (FGV/Exame de Suficiência/2024.1) Uma fábrica de brinquedos produz dois tipos de carrinhos: com\nquatro portas e com duas portas. A demanda mensal de cada tipo de carrinho é de 200 e de 250 unidades,\nrespectivamente. Além disso, o preço de venda e o custo variável unitário de cada tipo de carrinho são os\nseguintes\nTipo de carrinho\nPreço de venda\nCusto variável\nQuatro portas\nDuas portas\nEm janeiro de 2024, a fábrica tinha 900 portas para a produção dos carrinhos que seriam vendidos em\nfevereiro e não era possível realizar compras adicionais.\nCom o objetivo de maximização do resultado, assinale a opção que indica, respectivamente, o número de\ncarrinhos de quatro e de duas portas que devem ser produzidos.\nA)\t 100 e 250.\nB)\t 200 e 250.\nC)\t 225 e zero.\nD)\t 800 e 50.", "c": "Uma questão interessante que trata de margem de contribuição com fator de restrição. O maior resultado possível\nserá obtido dando-se prioridade à produção e venda dos produtos que possuem a maior margem de contribuição.\nAlém disso, temos que considerar a demanda mensal com outro fator de restrição à produção, vejam:\nQuatro portas\nDuas portas\nPreço Unitário\nR$ 100,00\nR$ 70,00\nCusto Variável\nR$ 40,00\nR$ 30,00\nMargem de Contribuição\nR$ 60,00\nR$ 40,00\nNúmero portas\nMargem de Contribuição/Fator Restrição\nOs produtos que possuem a maior margem de contribuição por fator de restrição são, respectivamente: duas\nportas e quatro portas. Se usarmos a margem de contribuição sem restrição, incorreremos em erro.\nDessa forma, devemos primeiro produzir o máximo de carrinhos do tipo \"duas portas\", mas devemos considerar\nque a demanda mensal é de apenas 250 unidades. Não adianta a empresa produzir mais, pois não terá demanda.\n250 carrinhos tipo \"duas portas\", o que irá consumir 500 portas (250 unidades x 2 portas)\nPoderíamos produzir 450 unidades (900/2) desses carrinhos de duas portas, mas a demanda é de apenas 250,\nportanto vamos produzir essa quantidade, o que consumiria 500 portas, sobrando, assim, 400 portas.\nDepois, produzir a maior quantidade possível de carrinhos tipo \"quatro portas\"; podemos produzir 400/4 = 100\ncarrinhos desse tipo e iremos consumir todas as portas restantes.\nO \"mix\" ideal de carrinhos, visando à maximização do resultado é a seguinte:\n•\t 100 carrinhos do tipo quatro portas.\n•\t 250 carrinhos do tipo duas portas.\nGabarito: A", "g": "A"}, {"n": 42, "q": "42.\t (FGV/Exame de Suficiência/2024.1) Um contador realizou uma análise completa das demonstrações\ncontábeis de uma empresa, efetuando as análises horizontal, vertical e por indicadores. O contador\nconstatou que as seguintes metodologias de análise traziam o mesmo resultado:\nA)\t análise vertical do Balanço Patrimonial e indicadores de prazos médios.\nB)\t análise horizontal do Balanço Patrimonial e indicadores de liquidez.\nC)\t análise vertical da Demonstração do Resultado do Exercício e indicadores de lucratividade.\nD)\t análise horizontal da Demonstração do Resultado do Exercício e indicadores de rentabilidade.", "c": "Nos índices de Lucratividade relacionamos o Lucro com as Vendas.\nSão Indicadores de Lucratividade:\n•\t Margem operacional:\n𝑀𝑀𝑀𝑀 = 𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿 𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂𝑂\n𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉 𝐿𝐿í𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞\n•\t Margem líquida:\n𝑀𝑀𝑀𝑀 = 𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿 𝐿𝐿í𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞\n𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉 𝐿𝐿í𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞\n•\t Margem Bruta:\n𝑀𝑀𝑀𝑀 =\n𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿𝐿 𝐵𝐵𝐵𝐵𝐵𝐵𝐵𝐵𝐵𝐵\n𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉𝑉 𝐿𝐿í𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞𝑞\nCuriosidade! Esses índices já são calculados por meio da Análise Vertical (também conhecida como análise da\nestrutura ou análise estática. Ela indica a estrutura das demonstrações contábeis, por meio de coeficientes de\nparticipações, bem como sua evolução no tempo).\nAdemais, vamos analisar o motivo de as demais alternativas estarem incorretas:\n(A) análise vertical do Balanço Patrimonial e indicadores de prazos médios.\nAlternativa incorreta. A análise vertical do Balanço Patrimonial calcula a participação percentual de cada conta\nem relação ao total do ativo ou passivo, revelando a estrutura da empresa em um determinado momento. Já\nos indicadores de prazos médios (como prazo médio de recebimento de vendas ou prazo médio de pagamento\na fornecedores) são cálculos temporais que avaliam a eficiência operacional em dias. Essas metodologias não\npodem trazer o mesmo resultado porque: (I) a análise vertical trabalha com percentuais estruturais, enquanto\nos prazos médios usam valores absolutos convertidos em dias; e (II) seus objetivos são completamente distintos,\nsendo que um mostra composição, o outro mede eficiência operacional.\n(B) análise horizontal do Balanço Patrimonial e indicadores de liquidez.\nAlternativa incorreta. A análise horizontal do Balanço Patrimonial compara a evolução das contas ao longo do\ntempo, mostrando variações percentuais período a período. Os indicadores de liquidez (como liquidez corrente ou\nseca), por sua vez, avaliam a capacidade de pagamento no curto prazo por meio de relações entre ativos e passivos\nem um momento específico. A incompatibilidade ocorre porque: (I) a análise horizontal é dinâmica (variação no\ntempo), enquanto a liquidez é estática (foto do momento); e (II) uma conta pode crescer 20% na análise horizontal\nsem necessariamente melhorar os índices de liquidez, que dependem de relações entre múltiplas contas.\n(D) análise horizontal da Demonstração do Resultado do Exercício e indicadores de rentabilidade.\nAlternativa incorreta. A análise horizontal da Demonstração do Resultado avalia como cada conta de receita e\ndespesa evoluiu em termos percentuais entre períodos. Já os indicadores de rentabilidade (como ROE ou ROA)\nrelacionam o lucro com os investimentos totais ou patrimônio líquido. A divergência dá-se porque: (I) a análise\nhorizontal mede crescimento, enquanto a rentabilidade mede a eficiência do capital investido; (II) uma empresa\npode ter crescimento nas receitas na análise horizontal, mas piora na rentabilidade se os investimentos crescerem\ndesproporcionalmente; e (III) as bases de cálculo são fundamentalmente diferentes (variação temporal vs. relação\nlucro/investimento).\nGabarito: C", "g": "C"}, {"n": 43, "q": "43.\t (FGV/Exame de Suficiência/2024.1) Em relação às despesas orçamentárias, avalie se as despesas a\nseguir são classificadas como despesas correntes:\nI. Despesas de custeio.\nII. Investimentos.\nIII. Inversões Financeiras.\nEstá correto o que se apresenta em\nA)\t I, apenas.\nB)\t I e II, apenas.\nC)\t I e III, apenas.\nD)\t II e III, apenas.\nComentários\nSegundo a Lei nº 4.320/64:\nArt. 12. A despesa será classificada nas seguintes categorias econômicas:\nDESPESAS CORRENTES\nDespesas de Custeio\nTransferências Correntes\nDESPESAS DE CAPITAL\nInvestimentos\nInversões Financeiras\nTransferências de Capital\nVejamos, portanto, os itens trazidos pela referida questão:\nI. Certo. De fato, as despesas de custeio são consideradas como despesas correntes.\nII. Errado. Pelo contrário, as despesas de investimentos serão consideradas como despesas de capital.\nIII. Errado. As despesas de inversões financeiras serão consideradas como despesas de capital.\nPortanto, ficamos com o gabarito na letra A.\nGabarito: A", "c": "", "g": ""}, {"n": 44, "q": "44.\t (FGV/Exame de Suficiência/2024.1) O setor de contabilidade de um determinado ente público estadual\nidentificou que, em janeiro de 2024, parte dos benefícios a serem pagos aos servidores ativos não foram\nprocessados em época própria, quando foi observado o direito ao recebimento, em outubro de 2023. Ao\nproceder com a emissão de empenho, considerando que o orçamento do referido ano consignava crédito\npróprio, com saldo suficiente para atendê-los, os benefícios foram classificados contabilmente como\nA)\t despesa corrente.\nB)\t despesa de capital.\nC)\t despesa de exercícios anteriores.\nD)\t despesa extraordinária.\nComentários\nA questão aborda uma situação em que benefícios devidos a servidores públicos em outubro de 2023 não\nforam processados no período adequado, sendo identificados apenas em janeiro de 2024. Nesse caso, como\no orçamento de 2023 já havia previsto os créditos necessários (com saldo suficiente) para cobrir tais despesas,\nmas o pagamento não ocorreu no exercício financeiro correto, a classificação contábil adequada é despesa de\nexercícios anteriores, conforme previsto no art. 37 da Lei nº 4.320/1964 e no Manual de Contabilidade Aplicada\nao Setor Público (MCASP).\nDESPESAS DE EXERCÍCIOS ANTERIORES\nSão despesas cujos fatos geradores ocorreram em exercícios anteriores àquele\nem que deva ocorrer o pagamento. O art. 37 da Lei nº 4.320/1964 dispõe que\nas despesas de exercícios encerrados, para as quais o orçamento respectivo\nconsignava crédito próprio, com saldo suficiente para atendê-las, que não\nse tenham processado na época própria, bem como os restos a pagar com\nprescrição interrompida e os compromissos reconhecidos após o encerramento\ndo exercício correspondente, poderão ser pagos à conta de dotação específica\nconsignada no orçamento, discriminada por elementos, obedecida, sempre\nque possível, a ordem cronológica.\nAnalisando as demais alternativas:\n(A) despesa corrente.\nAlternativa incorreta. Segundo o MCASP, item 4.2.4.2., despesas correntes são todas as despesas que não\ncontribuem, diretamente, para a formação ou aquisição de um bem de capital. Embora os benefícios aos\nservidores sejam tipicamente classificados como despesa corrente (por envolverem gastos com pessoal e\nmanutenção da administração), o fato de o pagamento estar sendo realizado fora do exercício em que o direito\nfoi gerado (outubro de 2023) exige uma classificação específica para esse contexto, descartando essa alternativa.\n(B) despesa de capital.\nAlternativa incorreta. Despesas de capital estão relacionadas a investimentos, inversões financeiras ou\namortização da dívida (como obras ou aquisição de bens permanentes). Como se trata de benefícios a servidores,\nnão há vínculo com essa categoria.\n(D) despesa extraordinária.\nAlternativa incorreta. Despesas extraordinárias são aquelas decorrentes de eventos imprevisíveis e urgentes,\ncomo calamidades públicas. Não é o caso, pois os benefícios eram obrigações previsíveis e orçamentadas.\nGabarito: C", "c": "", "g": ""}, {"n": 45, "q": "45.\t (FGV/Exame de Suficiência/2024.1) Nas eleições realizadas em outubro de 2022, uma escola do setor\npúblico funcionou como seção eleitoral para a realização da votação. A escola geralmente recebe R$5.000\nao ceder o seu espaço para a realização de outras atividades, no entanto, como se tratava de eleições, a\nescola cobrou R$4.500. Em outubro de 2022, a escola reconheceu uma receita\nA)\t com contraprestração de R$4.500.\nB)\t com contraprestração de R$5.000.\nC)\t sem contraprestração de R$4.500.\nD)\t sem contraprestração de R$5.000.\nComentários\nPrimeiramente, precisamos compreender o conceito de transação com e sem contraprestação. Senão, vejamos:\nSegundo o Manual de Contabilidade Aplicada ao Setor Público (MCASP):\nTransações com Contraprestação é aquela em que a entidade recebe ativos\nou serviços ou tem passivos extintos e entrega valor aproximadamente igual\nem troca, prioritariamente sob a forma de dinheiro, bens, serviços ou uso de\nativos.\nTransação sem contraprestação em geral, é aquela em que a entidade recebe\nativos ou serviços ou tem passivos extintos e em contrapartida entrega valor\nirrisório ou nenhum valor em troca. Considera-se, ainda, como transação sem\ncontraprestação, a situação em que a entidade fornece diretamente alguma\ncompensação em troca de recursos recebidos, mas tal compensação não se\naproxima do valor justo dos recursos recebidos.\nFeita essa contextualização, perceba que a escola é utilizada como seção eleitoral pelo Tribunal Regional Eleitoral\n(TRE) e recebeu R$ 4.500 para que o órgão utilizasse suas dependências no período de votação. Como o órgão\ndesembolsou esse montante e, em troca, a escola cedeu o espaço, estamos diante de uma transação com\ncontraprestação.\nA título de complemento, vejamos os exemplos de receita sem e com contraprestação, trazidos pela NBC TSP 01\ne 02, respectivamente:\nSegundo o item 5 da NBC TSP 01 - Receitas de Transações Sem Contraprestação, embora as receitas recebidas\npelas entidades do setor público se originem tanto das transações com contraprestação quanto das transações\nsem contraprestação, a maioria das receitas dos governos e de outras entidades do setor público é derivada\ntipicamente de transações sem contraprestação como: (a) Tributos; e (b) Transferências (monetárias ou não\nmonetárias), incluindo subsídios, perdão de dívidas, multas, heranças, presentes, doações, produtos e a porção\nfora do mercado de empréstimos subsidiados recebidos.\nPor outro lado, segundo o item 5 da NBC TSP 02 - Receita de Transação Com Contraprestação, exemplos\nde transações com contraprestação são: (a) a compra ou a venda de bens ou serviços; ou (b) o aluguel ou\narrendamento de itens do ativo imobilizado a valor de mercado.\nGabarito: A", "c": "", "g": ""}, {"n": 46, "q": "46.\t (FGV/Exame de Suficiência/2024.1) No ambiente empresarial, é cada vez mais relevante a criação de\nregras claras e de consciência sobre a importância do combate às irregularidades e aos desvios de conduta.\nUma cultura de integridade é pautada por ética e transparência nos negócios e nas relações de trabalho e se\nbaseia em um conjunto de regras, normas, políticas, processos e ferramentas voltado a prevenir, detectar\ne corrigir eventuais desvios. Além disso, deve-se incentivar a implantação de boas práticas de governança,\nprogramas de compliance, mecanismos de gerenciamento de riscos e controles internos. Em relação ao\ntema, analise as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa.\n( ) A governança corporativa se resume em mitigar prejuízos causados pelos conflitos de interesses entre\nacionistas e gestores.\n( ) O compliance é o instrumento de comprovação de aderência a normas e requerimentos estabelecidos,\ntanto o alinhamento a regras internas como o atendimento a normas externas decorrentes de leis e\nregulamentos.\n( ) Risco de compliance é o risco de sanções legais ou regulatórias, perdas financeiras ou danos reputacionais,\nmedidas administrativas ou criminais aplicadas à empresa, decorrentes da falta de cumprimento de\ndisposições legais, regulamentares, normas, autorregulações, padrões técnicos ou códigos de conduta.\n( ) Assédios, bullying, discriminação, conduta trabalhista ilícita e outros tipos de comportamentos abusivos\nnão causam danos à reputação da empresa, ao clima organizacional e aos colaboradores, nem geram\nimpacto nos resultados. As afirmativas são, respectivamente,\nA)\t V – F – F – F.\nB)\t F – V – V – V.\nC)\t F – F – V – V.\nD)\t F – V – V – F.", "c": "ITEM I – FALSO: segundo a IBGC, governança corporativa é um sistema formado por princípios, regras,\nestruturas e processos pelos quais as organizações são dirigidas e monitoradas, com vistas à geração de valor\nsustentável para a organização, para seus sócios e para a sociedade em geral. Quando as organizações aderem\naos princípios da governança corporativa (INTEGRIDADE, TRANSPARÊNCIA, EQUIDADE, RESPONSABILIZAÇÃO E\nSUSTENTABILIDADE), elas podem reduzir efetivamente o risco de prejuízos aos acionistas e garantir que sejam\nalcançados os objetivos de negócios definidos. O erro é “resume”.\nITEM II – VERDADE: “estar em compliance” é estar em conformidade com leis e regulamentos internos e externos.\nITEM III – VERDADE: risco de compliance é o risco de sanções legais ou regulamentares, perdas financeiras\nou mesmo perdas reputacionais decorrentes da falta de cumprimento de disposições legais, regulamentares,\ncódigos de conduta etc.\nITEM IV – FALSO: os erros são “não” e “nem”.\nGabarito: D", "g": "D"}, {"n": 47, "q": "47.\t (FGV/Exame de Suficiência/2024.1) Com base na NBC TA 705 – MODIFICAÇÕES NA OPINIÃO DO\nAUDITOR INDEPENDENTE, o tipo de parecer que o Auditor deve emitir quando, tendo obtido evidência\nde auditoria apropriada e suficiente, conclui que as distorções, individualmente ou em conjunto, são\nrelevantes e generalizadas para as demonstrações contábeis é\nA)\t a opinião com ressalva.\nB)\t a opinião adversa.\nC)\t a abstenção de opinião.\nD)\t o parágrafo de ênfase.", "c": "A questão aborda uma situação em que o auditor, após realizar seus procedimentos e obter evidências\nsuficientes, conclui que as distorções nas demonstrações contábeis são relevantes e generalizadas, ou seja,\nafetam significativamente a qualidade e a confiabilidade das informações apresentadas. Diante disso, a NBC TA\n705 – Modificações na Opinião do Auditor Independente estabelece que tipo de parecer deve ser emitido nesse\ncaso.\nVamos analisar cada alternativa:\n(A) a opinião com ressalva.\nAlternativa incorreta. A opinião com ressalva é emitida quando o auditor identifica distorções que são relevantes,\nmas não generalizadas, ou quando há limitação no escopo do trabalho que afeta apenas partes específicas das\ndemonstrações. No caso da questão, as distorções são generalizadas, ou seja, impactam as demonstrações\ncontábeis como um todo, o que exige um parecer mais severo. Portanto, essa alternativa não se aplica.\n(B) a opinião adversa.\nAlternativa correta. A opinião adversa é o parecer adequado quando o auditor conclui que as distorções são tão\nrelevantes e generalizadas que as demonstrações contábeis, como um todo, não representam adequadamente\na situação financeira da entidade. A NBC TA 705 prevê esse tipo de modificação quando os efeitos das distorções\ncomprometem a fidedignidade das informações de forma ampla. Assim, essa é a resposta correta.\n(C) a abstenção de opinião.\nAlternativa incorreta. A abstenção de opinião ocorre quando o auditor não consegue obter evidências suficientes\npara formar uma conclusão (por exemplo, devido a limitações extremas no escopo). No caso da questão, o\nauditor já obteve evidências suficientes e concluiu que as distorções são relevantes e generalizadas, o que exige\numa manifestação direta (opinião adversa), não a ausência de opinião.\n(D) o parágrafo de ênfase.\nAlternativa incorreta. O parágrafo de ênfase é utilizado para destacar uma questão relevante já adequadamente\ndivulgada nas demonstrações contábeis, sem que isso afete a opinião do auditor (que pode ser limpa ou com\nressalva). Ele não se aplica a casos em que há distorções generalizadas, pois sua função é apenas chamar a\natenção para algo, não expressar uma restrição ou rejeição às demonstrações.\nGabarito: B", "g": "B"}, {"n": 48, "q": "48.\t (FGV/Exame de Suficiência/2024.1) Joaquim, auditor renomado, foi consultado pela firma de auditoria\nNovos Auditores ABC, com a seguinte problemática: ao realizarem a análise do Balanço Patrimonial de\num de seus clientes, foi constatado um valor substancial de Fornecedores em seu Passivo em todos os\nmeses, caracterizando um acordo firmado de maneira recorrente; apesar disso, não foi encontrado na\ndocumentação de seu cliente o contrato que assegurasse essa relação contratual. De acordo com a NBC TA\n500 - EVIDÊNCIA DE AUDITORIA, nessa situação hipotética, assinale o procedimento mais adequado que\nJoaquim deveria indicar à firma Novos Auditores ABC, para que eles confirmassem tal relação.\nA)\t Observação.\nB)\t Recálculo.\nC)\t Análise Recombinante.\nD)\t Confirmação Externa.", "c": "A questão apresenta um cenário em que a firma de auditoria Novos Auditores ABC identificou um valor significativo\nde Fornecedores no passivo de um cliente, evidenciando uma relação recorrente, mas sem contrato formal que\ncomprove essa obrigação. Diante disso, o auditor Joaquim deve recomendar o procedimento mais adequado,\nconforme a NBC TA 500 - Evidência de Auditoria, para confirmar a existência e a legitimidade dessa dívida.\nVamos analisar cada alternativa:\n(A) Observação.\nAlternativa incorreta. A observação é um procedimento de auditoria que consiste em examinar processos ou\natividades sendo executadas, como a contagem física de estoques ou a verificação de procedimentos operacionais.\nNo caso em questão, o problema não está relacionado a um processo que possa ser visualizado, mas, sim, à\nvalidação de uma obrigação contábil (fornecedores) que carece de documentação formal. Portanto, esse método\nnão seria eficaz para confirmar a relação com os fornecedores.\n(B) Recálculo.\nAlternativa incorreta. O recálculo é utilizado para verificar a exatidão matemática de registros contábeis, como\ncálculos de depreciação, juros ou folha de pagamento. No caso apresentado, o problema não é um erro de cálculo,\nmas, sim, a falta de comprovação documental da dívida com fornecedores. Assim, essa técnica não resolveria a\nquestão central.\n(C) Análise Recombinante.\nAlternativa incorreta. O termo \"análise recombinante\" não é um procedimento reconhecido pelas normas de\nauditoria (NBC TA). Pode ser uma distração ou um termo equivocado. A NBC TA 500 trata de procedimentos\ncomo inspeção, observação, confirmação externa, entre outros, mas não menciona essa expressão. Portanto,\nessa alternativa está incorreta.\n(D) Confirmação Externa.\nAlternativa correta. A confirmação externa ou circularização é um dos procedimentos mais adequados nesse\ncaso, pois consiste em solicitar diretamente a terceiros (no caso, os fornecedores) a confirmação dos valores\ne termos da dívida. Como não há contrato interno que comprove a relação, a auditoria deve buscar evidências\nexternas para validar a existência e os valores registrados. A NBC TA 500 prevê esse método como essencial para\nconfirmar saldos e transações com partes externas, como fornecedores, bancos e clientes.\nA título de complemento, vejamos um esquema com os principais procedimentos de auditoria segundo a NBC\nTA 500(R1):\nGabarito: D", "g": "D"}, {"n": 49, "q": "49.\t (FGV/Exame de Suficiência/2024.1) No que tange ao conceito de honorários da perícia contábil, é\ncorreto afirmar, com base na NBC PP 01 (R1) – PERITO CONTÁBIL, que\nA)\t os honorários periciais fixados ou arbitrados e não quitados podem ser executados, judicialmente, pelo\nperito em conformidade com os dispositivos do Código de Processo Civil.\nB)\t ainda que a perícia seja considerada inconclusiva ou ineficiente, não há hipótese prevista em lei que\ndetermine a devolução parcial ou total dos valores recebidos.\nC)\t o perito nomeado pode requerer a liberação de até 30% dos honorários depositados, quando julgar\nnecessário para o custeio antes do início dos trabalhos.\nD)\t na elaboração da proposta de honorários, o perito deve considerar, entre outros fatores: quem será o\nmagistrado da causa; quem são as partes da causa; a complexidade da matéria e o prazo estabelecido para\no recebimento dos honorários.", "c": "Vamos analisar cada alternativa:\n(A) os honorários periciais fixados ou arbitrados e não quitados podem ser executados, judicialmente, pelo perito\nem conformidade com os dispositivos do Código de Processo Civil. Correto, esse é nosso gabarito e está de\nacordo com a NBC PP 01, item 40:\n40. Os honorários periciais fixados ou arbitrados e não quitados podem ser\nexecutados, judicialmente, pelo perito contábil em conformidade com os\ndispositivos do Código de Processo Civil.\n(B) ainda que a perícia seja considerada inconclusiva ou ineficiente, não há hipótese prevista em lei que determine\na devolução parcial ou total dos valores recebidos. Errado, o item 39 da NBC PP 01 afirma que, quando a perícia\nfor considerada inconclusiva ou ineficiente, ou quando o perito for substituído, pode a autoridade competente\ndeterminar a redução ou devolução do valor dos honorários já recebidos:\n39. Quando a perícia for considerada inconclusiva ou deficiente, ou quando o\nperito for substituído, pode a autoridade competente determinar a redução\nou a devolução do valor dos honorários já recebidos, condição que obriga o\nperito contábil a obedecer ao comando decisório e efetuar a devolução do\nvalor determinado.\n(C) o perito nomeado pode requerer a liberação de até 30% dos honorários depositados, quando julgar necessário\npara o custeio antes do início dos trabalhos. Errado, o item 38 da NBC PP 01 afirma que o perito nomeado pode\nrequerer a liberação de até 50% dos honorários depositados, quando julgar necessário para o custeio antes do\ninício dos trabalhos, sendo defeso o perito receber honorários diretamente dos litigantes ou de seus procuradores\nou prepostos, salvo disposição em contrário determinada pela autoridade competente:\n38. O perito nomeado pode requerer a liberação de até 50% dos honorários\ndepositados, quando julgar necessário para o custeio antes do início dos\ntrabalhos, sendo defeso o perito contábil receber honorários diretamente dos\nlitigantes ou de seus procuradores ou prepostos, salvo disposição em contrário\ndeterminada pela autoridade competente.\n(D) na elaboração da proposta de honorários, o perito deve considerar, entre outros fatores: quem será o\nmagistrado da causa; quem são as partes da causa; a complexidade da matéria e o prazo estabelecido para o\nrecebimento dos honorários. Errado, o item 32 da NBC PP 01 afirma que, na elaboração do plano de trabalho e\nrespectiva proposta de honorários, o perito deve considerar, entre outros fatores: a relevância, o vulto, o risco, a\nresponsabilidade, a complexidade operacional, o pessoal técnico, o prazo estabelecido e a forma de recebimento.\nNão há que se falar em magistrado da causa:\n32. Na elaboração do planejamento e da respectiva proposta de honorários,\no perito contábil deve considerar, entre outros fatores: o tempo, as etapas de\ntrabalho previstas, a relevância, o vulto, os recursos tecnológicos, a extensão\ne profundidade dos exames e testes periciais, o risco, a responsabilidade, a\ncomplexidade operacional, a equipe técnica, o lugar e o tempo de execução\ne gestão exigidos para a prestação do serviço, as peculiaridades regionais,\na forma de recebimento, os requisitos específicos de formação técnica,\nde habilitação legal e experiência e as condições especiais que envolvem a\nindependência profissional, a competência e o renome do profissional e a\npossibilidade de ficar o perito contábil impedido de atuar em outros casos.\nAlém disso, o perito contábil deve primar pela evidenciação dos critérios orientativos adotados na formação\ndo preço dentro da proporcionalidade e razoabilidade que cada caso requer, objetivando a aprovação de sua\nproposta de honorários.\nGabarito: A", "g": "A"}, {"n": 50, "q": "50.\t (FGV/Exame de Suficiência/2024.1) Acerca dos procedimentos periciais, julgue as afirmativas a seguir,\nconsiderando as disposições da NBC TP 01 (R1) – PERÍCIA CONTÁBIL:\nI. Indagação é a busca de informações mediante entrevista com conhecedores do objeto ou de fato\nrelacionado à perícia.\nII. Arbitramento é a determinação de valores e quantidades ou a solução de controvérsia por critério\ntécnico-científico.\nIII. Vistoria é a análise de livros, registros de transações e documentos.\nEstá correto apenas o que se afirma em\nA)\t II.\nB)\t I e III.\nC)\t III.\nD)\t I e II.", "c": "Questão que trata sobre procedimentos periciais. Segundo o item 35 da NBC TP 01:\n35. Os procedimentos periciais contábeis visam fundamentar o laudo pericial\ncontábil e o parecer técnico contábil e abrangem, total ou parcialmente,\nsegundo a natureza e a complexidade da matéria, exame, vistoria, indagação,\ninvestigação, arbitramento, mensuração, avaliação, testabilidade, comparação\ne certificação. Esses procedimentos são assim definidos:\n(a) exame é a análise de livros, registros de transações e documentos;\n(b) vistoria é a diligência que objetiva a verificação e a constatação de situação,\ncoisa ou fato, de forma circunstancial;\n(c) indagação é a busca de informações mediante entrevista com conhecedores\ndo objeto ou de fato relacionado à perícia;\n(d) investigação é a pesquisa que busca constatar o que está oculto por\nquaisquer circunstâncias;\n(e) arbitramento é a determinação de valores, quantidades ou a solução de\ncontrovérsia por critério técnico-científico;\n(f) mensuração é o ato de qualificação e quantificação física de coisas, bens,\ndireitos e obrigações;\n(g) avaliação é o ato de estabelecer o valor de coisas, bens, direitos, obrigações,\ndespesas e receitas;\n(h) testabilidade é a verificação dos elementos probantes juntados aos autos\ne o confronto com as premissas estabelecidas;\n(i) comparação é o ato de estabelecer relações e paralelos entre dois ou mais\nobjetos ou estados patrimoniais ou de resultado, para analisar semelhanças\nou diferenças e permitir conclusões para a tomada de decisão; e\n(j) certificação é o ato de atestar a informação obtida na formação da prova\npericial.\nDesse modo, vamos analisar cada alternativa:\nI. Indagação é a busca de informações mediante entrevista com conhecedores do objeto ou de fato relacionado\nà perícia.\nAlternativa correta, conforme item 35, c, da NBC TP 01.\nII. Arbitramento é a determinação de valores e quantidades ou a solução de controvérsia por critério técnico-\ncientífico.\nAlternativa correta, conforme item 35, e, da NBC TP 01.\nIII. Vistoria é a análise de livros, registros de transações e documentos.\nAlternativa errada. A questão apresentou a definição do procedimento pericial chamado \"exame\". Vistoria é a\ndiligência que objetiva a verificação e a constatação de situação, coisa ou fato, de forma circunstancial.\nDessa forma, estão corretos os itens I e II.\nGabarito: D\nGABARITO\nO que você achou deste e-book?\nsoluções por professores. Clique no link e conheça!", "g": "D"}];
let current=1;
const grid=document.getElementById('grid'), stage=document.getElementById('stage');
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function buildGrid(){grid.innerHTML=DATA.map(x=>`<button class="qbtn" id="b-${x.n}" onclick="showQ(${x.n}, false)">${x.n}</button>`).join('');}
function showQ(n, reveal=false){current=n; const x=DATA.find(i=>i.n===n); document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active')); const b=document.getElementById('b-'+n); if(b)b.classList.add('active');
 stage.innerHTML=`<article class="card" id="q-${x.n}"><div class="badge">QUESTÃO ${x.n}</div><div class="content">${esc(x.q)}</div><div class="nav"><button onclick="toggleAnswer()">🔗 Ver resposta / comentário</button><a class="linkbtn secondary" href="#r-${x.n}" onclick="openAnswer()">Ir para a resposta</a></div><div class="answer ${reveal?'show':''}" id="r-${x.n}"><h3>Resposta comentada</h3>${x.g?`<div class="gab">Gabarito: ${x.g}</div>`:''}<div class="content">${esc(x.c)}</div></div></article>`;
 window.location.hash='q-'+n; localStorage.setItem('cfc20241_current',n);
}
function openAnswer(){document.querySelector('.answer')?.classList.add('show');}
function toggleAnswer(){document.querySelector('.answer')?.classList.toggle('show');}
function nextQ(){showQ(current>=50?1:current+1)} function prevQ(){showQ(current<=1?50:current-1)} function restart(){localStorage.removeItem('cfc20241_current');showQ(1)}
window.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextQ(); if(e.key==='ArrowLeft')prevQ();});
buildGrid(); showQ(Number(localStorage.getItem('cfc20241_current'))||1);
</script></body></html>
