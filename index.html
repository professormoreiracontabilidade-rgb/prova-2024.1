<div class="floating"><button onclick="prevQ()">◀</button><button onclick="nextQ()">▶</button></div><footer class="footer">Material de estudo — somente questões e comentários.</footer>
<script>
const DATA=[{"n": 1, "q": "1.\t(FGV/Exame de Suficiência/2024.1) Os adjetivos podem representar estados, características, qualidades\nou relações. Assinale a frase em que o adjetivo sublinhado indica um estado.\nA)\t Profetizar o futuro não é difícil, mas é perigoso.\nB)\t Para o homem trabalhador, o tempo é elástico.\nC)\t Estamos sempre preocupados com o que vai acontecer.\nD)\t O futuro é a mais valiosa fonte de renda da imaginação.", "c": "Na gramática do célebre professor Celso Cunha, que é alvo de estudo da presente banca, são listados tipos de\nadjetivos. E é exatamente isso que foi cobrado pela FGV nessa questão. Adjetivos, segundo o professor Celso\nCunha, podem expressar: qualidades positivas ou negativas, características, estados ou relações. O professor\nainda acrescenta ‘modo de ser’, como em ‘pessoa simples’. Além disso, ele cita ‘aspecto ou aparência’, como em\n‘céu azul’. Quando o autor cita ‘aspecto ou aparência’, ele está falando exatamente de característica.\nA banca solicitou a opção em que o adjetivo porte a ideia de ‘estado’.\nEstado é um atributo momentâneo, algo não inerente a um ser. Não é algo que ele SEJA, e sim algo que ele\nESTEJA.\nEntre os adjetivos apresentados na questão, o gabarito é a letra C “estamos sempre preocupados com o que vai\nacontecer”.\nNesse caso, “preocupados” é um estado, algo que pode mudar. Não é uma qualidade nem uma característica.\nPara não restarem dúvidas, vamos analisar os erros das demais alternativas:\n(A) Profetizar o futuro não é difícil, mas é perigoso.\nAlternativa incorreta. \"Difícil\" e \"perigoso\" expressam qualidades (positivas/negativas) inerentes à ação de profetizar,\nnão um estado momentâneo. São características atribuídas à ação, algo que ela é, não algo que ela está.\n(B) Para o homem trabalhador, o tempo é elástico.\nAlternativa incorreta. \"Trabalhador\" é um adjetivo que indica característica permanente (modo de ser) do\nhomem, enquanto \"elástico\" é uma qualidade atribuída ao tempo (metáfora). Nenhum dos dois sugere um\nestado transitório.\n(D) O futuro é a mais valiosa fonte de renda da imaginação.\nAlternativa incorreta. \"Valiosa\" é um adjetivo que denota qualidade (positiva) da fonte de renda, algo intrínseco.\nNão há ideia de estado, mas de uma avaliação permanente.\nGabarito: C", "g": "C"}, {"n": 2, "q": "2.\t(FGV/Exame de Suficiência/2024.1) O escritor Érico Veríssimo falou sobre o consumidor: O objetivo do\nconsumidor não é o de possuir coisas, mas de consumir cada vez mais e mais, a fim de com isso compensar\nseu vácuo interior, sua passividade, sua solidão, seu tédio e sua ansiedade. Seguindo a opinião do autor, o\nconsumidor inveterado\nA)\t pretende possuir cada vez mais.\nB)\t procura compensar algumas deficiências.\nC)\t mostra tendência a economizar exageradamente.\nD)\t vive permanentemente com dificuldades econômicas.", "c": "A questão 2, de interpretação, exigiu o entendimento analítico sobre a frase do escritor Érico Veríssimo. Segundo\no autor, \"o objetivo do consumidor não é o de possuir coisas, mas de consumir cada vez mais e mais, a fim de\ncom isso compensar seu vácuo interior, sua passividade, sua solidão, seu tédio e sua ansiedade\". Observe que\nessa frase indica que o consumidor inveterado está buscando, por meio do consumo, preencher ou compensar\numa série de deficiências emocionais e psicológicas. A opção que expressa claramente isso é a letra B: “procura\ncompensar algumas deficiências”.\nAs demais alternativas estão incorretas porque não se alinham com a ideia central expressa por Érico Veríssimo\nem sua reflexão sobre o consumidor inveterado. Vamos analisá-las detalhadamente:\n(A) pretende possuir cada vez mais.\nAlternativa incorreta. O autor deixa claro que o objetivo do consumidor não é possuir coisas, mas, sim, consumir\nde forma compulsiva para compensar questões emocionais. A alternativa (A) desvia o foco para a posse material,\nenquanto o texto enfatiza o ato do consumo como válvula de escape psicológico, não como busca por acumulação.\n(C) mostra tendência a economizar exageradamente.\nAlternativa incorreta. O consumidor inveterado, conforme descrito no texto, é justamente o oposto: ele gasta\nexcessivamente, movido por impulsos emocionais (como tédio e ansiedade), não por racionalidade ou controle\nfinanceiro. Economizar exageradamente não tem relação com o perfil descrito.\n(D) vive permanentemente com dificuldades econômicas.\nAlternativa incorreta. O texto não menciona a situação financeira do consumidor, mas, sim, seu comportamento\nmotivado por vazios interiores. Dificuldades econômicas podem ser uma consequência do consumo desenfreado,\nmas o autor não as coloca como característica definidora do consumidor inveterado. O foco está na causa\npsicológica, não no efeito financeiro.\nDessa forma, a única alternativa que capta a essência do texto é a B, pois reflete a ideia de que o consumo\nexcessivo é uma tentativa de compensação para problemas como solidão e ansiedade. As outras ou distorcem o\nsentido (A), contradizem o comportamento descrito (C) ou introduzem elementos não abordados (D).\nGabarito: B", "g": "B"}, {"n": 3, "q": "3.\t(FGV/Exame de Suficiência/2024.1) Um determinado investimento foi realizado em 31/12/20X1, sob o\nregime de juros compostos, cuja taxa era de 2% ao mês. O aporte inicial foi de R$ 12.000. O valor total dos\njuros obtidos na operação, se ela for liquidada em 31/12/20X2, é de\nA)\t R$ 15.218,90.\nB)\t R$ 14.880,00.\nC)\t R$ 3.218,90.\nD)\t R$ 2.880,00.", "c": "M = C (1 + i)t\nM = 12.000 (1 + 0,02)12\nM = 12.000 (1,02)12\nM = 12.000 x 1,2682\nM = 15.218,90\nConsiderando que montante é resultado da soma entre capital e juros, então o valor total dos juros obtidos na\noperação, se ela for liquidada em 31/12/20X2, é de:\nM = C + J\n15.218,90 = 12.000 + J\nJ = 15.218,90 - 12.000,00\nJ = 3.218,00\nGabarito: C", "g": "C"}, {"n": 4, "q": "4.\t(FGV/Exame de Suficiência/2024.1) Uma firma de auditoria foi contratada para realizar um trabalho\nem uma empresa do ramo automobilístico. Os auditores independentes definiram, em seu processo de\namostragem, que irão selecionar a partir do método aleatório (disposto como um dos principais pela NBC\nTA 530 – Amostragem) apenas uma nota fiscal de venda por mês para sua posterior análise. Para o mês de\nnovembro de 20X1, as notas fiscais de venda foram assim distribuídas:\nConsiderando o exposto, a probabilidade de que seja selecionada uma nota fiscal referente à venda de um\nveículo de cor preta e de câmbio manual na amostragem de novembro de 20X1 é igual a\nA)\t 5%.\nB)\t 20%.\nC)\t 25%.\nD)\t 50%.", "c": "Para encontrarmos a probabilidade exigida, temos que dividir o número de casos que estamos procurando pelo\ntotal de casos possíveis.\nO espaço amostral apresenta um total de 25 elementos (5 + 7 + 7 + 6 = 25).\nA quantidade de elementos que atendem ao critério de cor preta e câmbio manual é igual a 5. Assim, a\nprobabilidade de ocorrência desse evento é calculada da seguinte forma:\nP = 5/25 = 0,2 ou 20%\nGabarito: B", "g": "B"}, {"n": 5, "q": "5.\t(FGV/Exame de Suficiência/2024.1) A sociedade empresária Delta acabou de ser constituída, o que foi\nfeito com estrita observância da sistemática legal, tendo por objeto a venda de livros. No dia imediatamente\nanterior ao início de suas atividades, os sócios da Delta questionaram o seu contador sobre a respectiva\ncarga tributária, mais especificamente a respeito dos tributos que Delta estava obrigada a recolher. O\ncontador respondeu corretamente que Delta, em razão do seu objeto social,\nA)\t não recolheria nenhum tributo.\nB)\t somente recolheria impostos.\nC)\t recolheria taxas.\nD)\t somente recolheria contribuições de melhoria.", "c": "O objetivo da questão é filtrar que espécie tributária pode incidir sobre uma empresa que exerce a atividade\ncomercial de venda de livros.\nO caso em questão retrata uma empresa que acaba de ser constituída, que tem por objetivo vender livros.\nSabemos que a Constituição Federal prevê imunidade tributária em relação aos impostos incidentes sobre livros,\njornais e periódicos, bem como o papel destinado a sua impressão (art. 150, VI, “d”).\nAssim sendo, vamos lá:\nLetra A: como a imunidade é específica para impostos sobre a venda dos livros, a empresa poderia ser obrigada\na pagar outros tributos porventura devidos, como taxas e contribuições de melhoria. Errada.\nLetra B: a empresa, na realidade, está dispensada do pagamento de impostos (não todos, é claro, mas apenas\naqueles incidentes sobre a venda de livros). Errada.\nLetra C: como a questão não mencionou “somente”, está correta. Afinal, a imunidade restringe-se aos impostos. Correta.\nLetra D: outras espécies tributárias poderiam ser devidas pela empresa, como taxas, por exemplo. Errada.\nA título de complemento, temos dois pontos adicionais para destacar:\nO Supremo Tribunal Federal (STF) já consolidou o entendimento de que a imunidade tem natureza objetiva, ou\nseja, protege o produto (livro), não o sujeito (empresa). Além disso, a imunidade estende-se ao formato digital\n(e-book), pois o texto constitucional não se restringe ao suporte físico.\nAdemais, a Emenda Constitucional 132/2023 (Reforma Tributária) criou a Contribuição sobre Bens e Serviços\n(CBS), que substituirá PIS e COFINS.\nEmbora o texto do art. 150, VI, refira-se aos impostos “é vedado instituir imposto sobre...”, temos que interpretá-\nlo em conjunto com outras regras constitucionais.\nAssim, com a EC 132/2023 (Reforma Tributária), foi introduzido o art. 149-B, que trata de regras comuns relativas\naos novos tributos (Imposto sobre Bens e Serviços e Contribuição sobre Bens e Serviços).\nOcorre que o parágrafo único do art. 149-B estabeleceu que as imunidades do art. 150, VI, também se aplicam à\nCBS, que não pode ser confundida com imposto.\nPortanto, atualmente, a imunidade cultural alcança impostos e também a Contribuição sobre Bens e Serviços\n(CBS).\nDessa forma, antes da reforma, a imunidade não cobria contribuições (como PIS/COFINS). Agora, a CBS (uma\ncontribuição) também está protegida.\nGabarito: C", "g": "C"}, {"n": 6, "q": "6.\t(FGV/Exame de Suficiência/2024.1) João comunicou a Maria que:\nI. a Lei nº X, editada pela União, disciplinou as situações em que poderia ocorrer a renúncia a determinada\nposição jurídica;\nII. a renúncia, para ser válida, deveria observar os estritos termos legais;\nIII. Pedro renunciou a um direito que deixou de integrar a sua esfera jurídica e, automaticamente, passou\na integrar a esfera jurídica de Maria.\nNas situações descritas por João em I, II e III, estamos perante, respectivamente, os denominados:\nA)\t poder estatal, direito positivo e direito natural.\nB)\t direito objetivo, direito natural e faculdade jurídica.\nC)\t direito positivo, direito objetivo e direito subjetivo.\nD)\t direito subjetivo, direito natural e dinâmica relacional.", "c": "I. A Lei nº X, editada pela União, disciplinou as situações em que poderia ocorrer a renúncia a determinada\nposição jurídica → direito positivo, uma vez que está positivando a norma, isto é, direito escrito.\nII. A renúncia, para ser válida, deveria observar os estritos termos legais → direito objetivo, pois está relacionado\ncom a intepretação da norma, isto é, direito posto.\nIII. Pedro renunciou a um direito que deixou de integrar sua esfera jurídica e, automaticamente, passou a integrar\na esfera jurídica de Maria → direito subjetivo, pois uma pessoa específica renunciou ao direito.\nGabarito: C", "g": "C"}, {"n": 7, "q": "7.\t(FGV/Exame de Suficiência/2024.1) Pedro é empregado, há exatos três anos, da sociedade empresária\nAlfa, que cumpria todas as suas obrigações, a começar pelo rigoroso pagamento do salário mensal dos\nseus empregados. No entanto, Maria, sua superior hierárquica, decidiu que Pedro não vinha cumprindo a\ncontento suas obrigações, logo, deveria ser demitido. À luz desse quadro, Maria consultou o Departamento\nde Recursos Humanos em relação à concessão de aviso prévio a Pedro, sendo-lhe corretamente informado\nque\nA)\t cabe a Alfa optar pela concessão de aviso prévio ou pela permanência de Pedro em casa, sem remuneração.\nB)\t o aviso prévio a ser dado a Pedro é de 30 (trinta) dias.\nC)\t é necessário o pagamento de indenização correspondente a um mês de trabalho.\nD)\t o aviso prévio a ser dado a Pedro é de 39 (trinta e nove) dias.", "c": "O gabarito da questão está na letra (D), tendo em vista que o empregado (Pedro) possui 3 anos de empresa.\nNesse caso, percebe-se que seu aviso prévio terá a duração de 39 dias, com fundamento na Lei 12.506/2011:\nLei 12.506/2011, art. 1º, Parágrafo único. Ao aviso prévio previsto neste artigo serão acrescidos 3 (três) dias por\nano de serviço prestado na mesma empresa, até o máximo de 60 (sessenta) dias, perfazendo um total de até 90\n(noventa) dias.\nPelo mesmo raciocínio, percebemos que as letras B e C estão incorretas.\nQuanto à letra A, ressalto que está absolutamente incorreta, na medida em que o aviso prévio deve ser\nremunerado.\nGabarito: D", "g": "D"}, {"n": 8, "q": "8.\t(FGV/Exame de Suficiência/2024.1) A ética pode ser aplicada em praticamente todas as nossas ações.\nEm algumas, ela terá um peso maior que em outras e o importante é buscar agir de acordo com princípios\nmorais e valores alinhados ao que consideramos mais justo para nós e para os outros. Isto é, pensar no\nque faz mais sentido para o contexto e a melhoria de todos e não apenas em nosso próprio ganho pessoal.\nCom base na reflexão, avalie se as afirmativas a seguir são falsas (F) ou verdadeiras (V):\n( )No ambiente de trabalho, a ética é fundamental para garantir um ambiente saudável e produtivo entre\nas pessoas.\n( )Agir de forma ética pode ser ter uma postura respeitosa em relação aos colegas, clientes e fornecedores;\nmanter a confidencialidade das informações e evitar conflitos de interesse.\n( )A ética envolve tomar decisões justas, cumprindo as leis e normas regulatórias e considerando o impacto\nde nossas ações em relação aos outros. As afirmativas são, respectivamente,\nA)\t V – V – V.\nB)\t V – F – F.\nC)\t F – V – V.\nD)\t F – F – F.", "c": "Vejamos cada afirmativa.\n(V) No ambiente de trabalho, a ética é fundamental para garantir um ambiente saudável e produtivo entre as\npessoas.\nPessoal, essa afirmativa não está expressa diretamente no Código de Ética Profissional do Contador, mas\ntransmite-nos a ideia exata de que, para termos um relacionamento saudável dentro das entidades, é necessário\nque a ética seja um dos preceitos, se não o preceito, fundamentais para que isso ocorra.\n(V) Agir de forma ética pode ser ter uma postura respeitosa em relação aos colegas, clientes e fornecedores;\nmanter a confidencialidade das informações e evitar conflito de interesse.\nDe acordo com o Código de Ética Profissional do Contador, essa afirmativa constitui um dos deveres do contador.\nSenão, vejamos.\n4. São deveres do contador:\n(...)\n(e) aplicar as salvaguardas previstas pela profissão, pela legislação, por regulamento ou por organização\nempregadora toda vez que identificar ou for alertado da existência de ameaças mencionadas nas normas de\nexercício da profissão contábil, observando o seguinte:\n(i) tomar medidas razoáveis para evitar ou minimizar conflito de interesses;\nAlém disso, temos:\n16. A conduta do contador com relação aos colegas deve ser pautada nos princípios de consideração, respeito,\napreço, solidariedade e harmonia da classe.\n(V) A ética envolve tomar decisões justas, cumprindo as leis e normas regulatórias e considerando o impacto de\nnossas ações em relação aos outros.\nDe fato, quando o contador – e qualquer profissional – estiver pautado sob a ética, as decisões serão justas,\nobservarão o que as leis e regulamentos ditam e impactará positivamente nas relações com os demais colegas\nque fazem parte do grupo de trabalho.\nCom isso, todas as afirmativas estão devidamente corretas.\nGabarito: A", "g": "A"}, {"n": 9, "q": "9.\t(FGV/Exame de Suficiência/2024.1) Na aplicação das sanções éticas, avalie os itens a seguir:\nI. A gravidade da infração.\nII. A punição ética anterior transitada em julgado.\nIII. A aplicação de salvaguardas.\nIV. A ação ou omissão que macule publicamente a imagem do contador.\nPodem ser considerados agravantes os itens\nA)\t I e II, apenas.\nB)\t I, II e III.\nC)\t I, II e IV.\nD)\t II, III e IV.", "c": "Segundo a NBC PG 01 - Código de Ética Profissional do Contador:\n22. Na aplicação das sanções éticas, podem ser consideradas como agravantes:\n(a) ação ou omissão que macule publicamente a imagem do contador;\n(b) punição ética anterior transitada em julgado; e\n(c) gravidade da infração.\nVejamos, portanto, cada afirmativa que a questão nos trouxe.\nI. Certo. Corresponde a uma das espécies de agravantes (item c).\nII. Certo. Corresponde a uma das espécies de agravantes (item b).\nIII. Errado. A aplicação de salvaguardas compreende uma das espécies de sanções éticas atenuantes.\nIV. Certo. Corresponde a uma das espécies de agravantes (item a).\nPortanto, os itens I, II e IV estão de acordo com o que foi solicitado pelo enunciado da questão.\nGabarito: C", "g": "C"}, {"n": 10, "q": "10.\t (FGV/Exame de Suficiência/2024.1) Avalie, com base no Código de Ética do contador, se os deveres do\ncontador incluem, entre outros:\nI. exercer a profissão com zelo, diligência, honestidade e capacidade técnica, observando as Normas\nBrasileiras de Contabilidade e a legislação vigente, resguardando o interesse público, os interesses de seus\nclientes ou empregadores, sem prejuízo da dignidade e independência profissionais;\nII. recusar sua indicação em trabalho quando reconheça não se achar capacitado para a especialização\nrequerida;\nIII. guardar sigilo sobre o que souber em razão do exercício profissional, inclusive no âmbito do serviço\npúblico, ressalvados os casos previstos em lei ou quando solicitado por autoridades competentes, entre\nestas os Conselhos Federal e Regionais de Contabilidade. Está correto o que se afirma em:\nA)\t I e II, apenas.\nB)\t I e III, apenas.\nC)\t II e III, apenas.\nD)\t I, II e III.", "c": "Pessoal, vamos analisar item por item de acordo com o que está na NBC PG 01 - Código de Ética Profissional do\nContador. Senão, vejamos:\nI. Certo. Segundo o referido código de ética:\n4. São deveres do contador:\n(a) exercer a profissão com zelo, diligência, honestidade e capacidade técnica, observando as Normas Brasileiras\nde Contabilidade e a legislação vigente, resguardando o interesse público, os interesses de seus clientes ou\nempregadores, sem prejuízo da dignidade e independência profissionais;\nII. Certo. De acordo com o código de ética:\n4. São deveres do contador:\n(...)\n(b) recusar sua indicação em trabalho quando reconheça não se achar capacitado para a especialização\nrequerida;\nIII. Certo. Em conformidade com o que dispõe o código de ética:\n4. São deveres do contador:\n(...)\n(c) guardar sigilo sobre o que souber em razão do exercício profissional, inclusive no âmbito do serviço público,\nressalvados os casos previstos em lei ou quando solicitado por autoridades competentes, entre estas os\nConselhos Federal e Regionais de Contabilidade;\nPortanto, todos os itens estão de acordo com o Código de Ética Profissional do Contador.\nGabarito: D", "g": "D"}, {"n": 11, "q": "11.\t (FGV/Exame de Suficiência/2024.1) As demonstrações contábeis são normalmente elaboradas com\nbase na suposição de que a entidade que reporta está em continuidade operacional. Desse modo, presume-\nse que a entidade não tem a intenção e nem a necessidade de\nA)\t tornar-se internacional.\nB)\t modificar a sua atividade-fim.\nC)\t entrar em liquidação ou deixar de negociar.\nD)\t expandir os seus negócios para outras localidades.", "c": "A continuidade operacional é um dos pilares da contabilidade, pois define a premissa básica sobre a qual as\ndemonstrações financeiras são elaboradas. Esse princípio está previsto na NBC TG 00 (Estrutura Conceitual) e\nestabelece que, a menos que haja evidências contrárias, presume-se que a empresa continuará suas atividades\nno futuro previsível, sem intenção ou necessidade de encerrar suas operações ou entrar em liquidação. Essa\nsuposição é fundamental porque influencia diretamente a forma como os ativos e passivos são avaliados e\napresentados.\nSegundo a NBC TG – Estrutura Conceitual:\n3.9 As demonstrações contábeis são normalmente elaboradas com base na suposição de que a entidade que\nreporta está em continuidade operacional e continuará em operação no futuro previsível. Assim, presume-se que\na entidade não tem a intenção nem a necessidade de entrar em liquidação ou deixar de negociar. Se existe essa\nintenção ou necessidade, as demonstrações contábeis podem ter que ser elaboradas em base diferente. Em caso\nafirmativo, as demonstrações contábeis descrevem a base utilizada.\nDesse modo, quando uma empresa opera sob a premissa da continuidade, seus ativos são registrados com base em\nseu valor de uso, ou seja, considerando sua capacidade de gerar benefícios econômicos futuros. Da mesma forma, as\nobrigações são reconhecidas como exigíveis no curso normal dos negócios, sem a pressuposição de que precisarão\nser quitadas antecipadamente em um cenário de liquidação. No entanto, se houver indícios concretos de que a\nempresa pode não ser capaz de manter suas operações, como prejuízos acumulados significativos, inadimplência\nfinanceira ou processos judiciais que ameacem sua existência, o contador tem a obrigação de reavaliar a aplicação\ndesse princípio. Nesses casos, as demonstrações contábeis podem precisar ser ajustadas para refletir valores\nrealizáveis em uma eventual liquidação, e essa mudança deve ser claramente divulgada nas notas explicativas.\nA questão apresentada pela FGV explora justamente esse conceito, destacando que a continuidade operacional\npressupõe a ausência de intenção ou necessidade de liquidação. As alternativas incorretas (A, B e D) desviam-se\ndo cerne da questão ao mencionar situações como internacionalização, mudança de atividade-fim ou expansão\ngeográfica, que são decisões estratégicas e não afetam a premissa da continuidade. Em resumo, a continuidade\noperacional está intrinsecamente ligada à sustentabilidade do negócio, e seu correto entendimento é essencial\ntanto para a elaboração das demonstrações financeiras quanto para a análise por parte de investidores, credores\ne outros stakeholders.\nPortanto, a alternativa C é a única que efetivamente capta a essência do princípio, ao afirmar que a entidade não\ntem a intenção nem a necessidade de entrar em liquidação ou cessar suas atividades.\nGabarito: C", "g": "C"}, {"n": 12, "q": "12.\t (FGV/Exame de Suficiência/2024.1) Desreconhecimento é a retirada de parte ou da totalidade de ativo\nou passivo reconhecido do balanço patrimonial da entidade. O desreconhecimento normalmente ocorre\nquando esse item não atende mais à definição de ativo ou passivo, que expirou, foi consumido, recebido,\nexecutado ou transferido. A máquina utilizada para a produção do principal produto de uma determinada\nentidade deve ser desreconhecida quando\nA)\t perder todo o potencial de produzir benefícios econômicos para a entidade.\nB)\t estiver parcialmente depreciado.\nC)\t sofrer perda de valor recuperável.\nD)\t estiver sob controle da entidade.", "c": "Segundo a NBC TG – Estrutura Conceitual:\n5.26 Desreconhecimento é a retirada de parte ou da totalidade de ativo ou passivo reconhecido do balanço\npatrimonial da entidade. O desreconhecimento normalmente ocorre quando esse item não atende mais à\ndefinição de ativo ou passivo:\n(a) para o ativo, o desreconhecimento normalmente ocorre quando a entidade perde o controle da totalidade\nou de parte do ativo reconhecido; e\n(b) para o passivo, o desreconhecimento normalmente ocorre quando a entidade não possui mais uma obrigação\npresente pela totalidade ou parte do passivo reconhecido.\nNesse contexto, a letra A satisfaz o comando da questão, sendo que as demais afirmativas não possuem relação\nalguma com o que foi solicitado.\nGabarito: A", "g": "A"}, {"n": 13, "q": "13.\t (FGV/Exame de Suficiência/2024.1) Conforme a NBC TG – ESTRUTURA CONCEITUAL, uma Receita\nreflete aumento nos ativos, ou redução nos passivos, que resultam em aumentos no patrimônio líquido,\nexceto aqueles referentes a contribuições de detentores de direitos sobre o patrimônio. Avalie se são\nreconhecidos como Receita, nesse contexto, os seguintes itens:\nI. Ganho de aplicação financeira.\nII. Transferência de estoques a clientes.\nIII. Ganho na venda de imobilizado.\nIV. Entrada de recursos pela emissão/venda de debêntures.\nV. Entrada de recursos pela integralização do capital social.\nVI. Ganho na venda de ações em tesouraria.\nSão considerados receitas os itens\nA)\t IV, V e VI.\nB)\t II, III e VI.\nC)\t I, III e IV.\nD)\t I, II e III.", "c": "Vamos analisar cada alternativa:\nI. Ganho de aplicação financeira. Correto, o ganho decorrente de aplicações financeiras pode ser considerado\numa receita do tipo financeira.\nII. Transferência de estoques a clientes. Correto, conforme previsão do CPC 47 - Receita de Contrato com\nCliente, a receita é reconhecida quando a entidade cumpre sua obrigação de desempenho. No caso da venda de\nmercadorias, essa obrigação é a transferência de controle dos estoques aos clientes.\nIII. Ganho na venda de imobilizado. Correto, a venda de um ativo imobilizado por valor superior a seu valor\ncontábil gera um ganho, uma receita.\nIV. Entrada de recursos pela emissão/venda de debêntures. Errado, a emissão de debêntures, ainda que seja com\nágio, não enseja o reconhecimento de uma receita. Ao longo do prazo da operação, atendendo ao regime de\ncompetência, haverá o reconhecimento de uma receita financeira.\nV. Entrada de recursos pela integralização do capital social. Errado, trata-se de transação de capital com os sócios,\nlogo não há efeitos no resultado do exercício.\nVI. Ganho na venda de ações em tesouraria. Errado, o ganho decorrente da venda de ações em tesouraria será\nlançado como uma reserva de capital, diretamente no patrimônio líquido. Não representa uma receita.\nGabarito: D", "g": "D"}, {"n": 14, "q": "14.\t (FGV/Exame de Suficiência/2024.1) O conceito de Capital é adotado pela maioria das entidades na\nelaboração das Demonstrações Contábeis. A seleção do conceito apropriado de Capital pela entidade deve\nser baseada nas necessidades dos seus usuários, principalmente, os preocupados com a manutenção de\ncapital nominal investido ou com o poder de compra do capital investido. A manutenção do Capital em que\no lucro é auferido somente se o montante dos ativos líquidos no final do período exceder o montante dos\nativos líquidos no início do período, após excluir quaisquer distribuições para, e contribuições de, sócios\ndurante o período, é a Manutenção do\nA)\t Capital Físico.\nB)\t Capital Financeiro.\nC)\t Capital Social.\nD)\t Capital Integralizado.", "c": "O conceito financeiro de capital é adotado pela maioria das entidades na preparação de suas demonstrações\ncontábeis. De acordo com o conceito financeiro de capital, tal como o dinheiro investido ou seu poder de compra\ninvestido, o capital é sinônimo de ativo líquido ou patrimônio líquido da entidade. Por outro lado, segundo o\nconceito físico de capital, o capital é considerado como a capacidade produtiva da entidade baseada, por exemplo,\nnas unidades de produção diária.\nGabarito: B", "g": "B"}, {"n": 15, "q": "15.\t (FGV/CFC/2024) Em 31/12/2022, uma companhia tinha seu capital social dividido em 40.000 ações\nordinárias (ON). Naquela data, todas estavam em poder dos acionistas.\nAs seguintes operações com ações foram registradas durante o exercício de 2023:\nData\nOperação\n30/04/2023\nEmissão de 1.000 novas ações ON, imediatamente subscritas e integralizadas\npelos acionistas\n30/09/2023\nRecompra de 2.000 ações, mantidas em tesouraria\n30/11/2023\nVenda de 1.000 ações que estavam em tesouraria\nAo final do exercício de 2023, a companhia apurou Lucro Líquido de R$ 202.110. Os valores do Resultado\nBásico por ação e do Resultado Diluído por ação, a serem divulgados pela companhia, são, respectivamente,\nA)\t 5,05275 e 5,02137.\nB)\t 5,02137 e 5,02137.\nC)\t 5,05275 e 4,92951.\nD)\t 5,05275 e 5,0275.", "c": "Vamos calcular o total de ações, ponderadas pelo tempo.\nAs ações iniciais (40.000) ficaram durante o ano todo em poder dos acionistas.\nEm 30/04/2023, houve a emissão de 1.000 novas ações, as quais ficaram 8 meses em poder dos acionistas.\nAssim, vamos dividir a quantidade (1.000) por 12 meses e multiplicar por 8:\n(1.000 ações/12 meses) x 8 meses = 667 ações.\nO quadro completo fica assim:\nData\nOperação\nQuant.\nTempo\n(meses)\nQuantidade\nPonderada\nAções ordinárias - inicial\n40.000\n40.000\n30/04/2023\nEmissão de 1.000 novas ações ON\n1.000\n30/09/2023\nRecompra de 2.000 ações, mantidas\nem tesouraria\n- 2.000\n- 500\n30/11/2023\nVenda de 1.000 ações que estavam\nem tesouraria\n1.000\nTotal\n40.250\nAgora, vamos dividir o lucro pela quantidade ponderada de ações:\nLucro R$ 202.110 / 40.250 ações = R$ 5,02137.\nNão houve nenhum fato que alterasse o resultado diluído. Assim, o resultado básico e o resultado diluído\napresentam o mesmo valor, de R$ 5,02137.\nGabarito: B", "g": "B"}, {"n": 16, "q": "16.\t (FGV/Exame de Suficiência/2024.1 Conforme a NBC TG 04 (R4) – ATIVO INTANGÍVEL, não são exemplos\nde gastos a serem reconhecidos como despesa aqueles incorridos com\nA)\t atividades pré-operacionais destinadas a constituir a empresa.\nB)\t treinamento do pessoal próprio.\nC)\t publicidade e atividades promocionais.\nD)\t o desenvolvimento de ativos intangíveis gerados internamente.", "c": "Um ativo intangível deve ser reconhecido inicialmente ao custo.\nO custo de ativo intangível adquirido separadamente inclui:\n(a) seu preço de compra + impostos de importação + impostos não recuperáveis sobre\ncompra – descontos comerciais e abatimentos.\n(b) qualquer custo diretamente atribuível à preparação do ativo para a finalidade proposta.\nEsquematizemos:\nCusto de ativo intangível adquirido:\nPreço de compra\nImpostos de importação\nImpostos não recuperáveis\n(-) Descontos comerciais e abatimentos\nQualquer custo diretamente atribuível (testes, benefícios a empregados, honorários profissionais)\nNão entram no custo do ativo intangível\nCustos com propaganda\nPromoção\nTreinamento\nCustos administrativos e outros custos indiretos\nVoltando a nossa questão, das opções apresentadas, apenas o desenvolvimento de ativos intangíveis gerados\ninternamente não será contabilizado como despesa, visto que, se atendidos os critérios de reconhecimento, eles\npoderão ser ativados ou capitalizados.\nOs demais gastos apresentados são contabilizados como despesas.\nGabarito: D", "g": "D"}, {"n": 17, "q": "17.\t (FGV/Exame de Suficiência/2024.1) A Sociedade A possui 65% de ações com direito a voto sobre a\nSociedade B, cujo Patrimônio Líquido equivale a R$2.000.000. Com essa participação a Sociedade A\nexerce o controle da sociedade B. Durante o exercício de 2023, a Sociedade “B” apresentou um lucro\nde R$200.000. Diante dos dados apresentados, e de acordo com a NBC TG 18 (R3) – INVESTIMENTO EM\nCOLIGADA, em Controlada e em Empreendimento Controlado em Conjunto, a Sociedade A efetuará, em\nsuas demonstrações contábeis individuais, um registro de\nA)\t débito em Caixa e crédito em Investimentos na Sociedade B no valor de R$130.000.\nB)\t débito em Investimentos na Sociedade B e crédito em Receita de equivalência patrimonial no valor de\nR$200.000.\nC)\t débito em Receita de equivalência patrimonial e crédito em Investimentos na Sociedade B no valor de\nR$200.000.\nD)\t débito em Investimentos na Sociedade B e crédito em Receita de equivalência patrimonial no valor de\nR$130.000.", "c": "Questão que trata da contabilização dos ganhos ou perdas com equivalência patrimonial. A Sociedade A possui\n65% de ações com direito a voto sobre a Sociedade B, logo se trata de um investimento avaliado pelo método da\nequivalência patrimonial.\nSegundo o item 10 da NBC TG 18 (R3):\n10. Pelo método da equivalência patrimonial, o investimento em coligada\nou em empreendimento controlado em conjunto deve ser inicialmente\nreconhecido pelo custo e o seu valor contábil será aumentado ou diminuído\npelo reconhecimento da participação do investidor nos lucros ou prejuízos do\nperíodo, gerados pela investida após a aquisição. A participação do investidor\nno lucro ou prejuízo do período da investida deve ser reconhecida no resultado\ndo investidor.\nDessa forma, como a Cia B apresentou um lucro de R$ 200.000, por equivalência patrimonial, a Cia A irá reconhecer,\nem seu resultado, 65% desse valor, a título de receita, isto é, 65% x 200.000 = R$ 130.000,00\nA contabilização desse fato será:\nDébito em Investimentos na Sociedade B\nR$130.000\nCrédito em Receita de equivalência patrimonial no valor de\nR$ 130.000\nGabarito: D", "g": "D"}, {"n": 18, "q": "18.\t (FGV/Exame de Suficiência/2024.1) Sem observar as exceções previstas no item 4.1.5 da NBC TG 48\n– INSTRUMENTOS FINANCEIROS, um ativo financeiro que, para a entidade que reporta a informação, é\nmantido dentro de modelo de negócios, cujo objetivo seja atingido tanto pelo recebimento de fluxos de\ncaixa contratuais quanto pela venda de ativos financeiros, e se os termos contratuais do ativo financeiro\nderem origem, em datas especificadas, a fluxos de caixa que constituam exclusivamente pagamentos de\nprincipal e juros sobre o valor do principal em aberto, deve ser mensurado no momento subsequente ao\nA)\t Custo Amortizado.\nB)\t Valor Justo Por Meio de Outros Resultados Abrangentes.\nC)\t Valor Justo Por Meio de Resultado.\nD)\t Valor Realizável Líquido.", "c": "O ativo financeiro deve ser mensurado ao valor justo por meio de outros resultados abrangentes se ambas as\nseguintes condições forem atendidas:\n(a) o ativo financeiro for mantido dentro de modelo de negócios cujo objetivo seja atingido tanto pelo recebimento\nde fluxos de caixa contratuais quanto pela venda de ativos financeiros; e\n(b) os termos contratuais do ativo financeiro derem origem, em datas especificadas, a fluxos de caixa que\nconstituam exclusivamente pagamentos de principal e juros sobre o valor do principal em aberto.\nEsquematizemos:\nNesse caso (valor justo por meio dos resultados abrangente), a entidade, em princípio, pretende segurar os\ntítulos para receber os juros, mas pode negociar os títulos em algum momento, se houver necessidade ou\nconveniência.\nPodemos relacionar essa classificação com a antiga categoria dos “títulos disponíveis para venda futura”.\nVale lembrar que o principal é o valor justo do ativo financeiro no reconhecimento inicial.\nGabarito: B", "g": "B"}, {"n": 19, "q": "19.\t (FGV/Exame de Suficiência/2024.1) No ano de 2023, a Sociedade Empresária XXX foi autuada por\num órgão fiscal que alegava o não recolhimento de determinado imposto no valor de R$7.000.000. Com\nbase na análise de seu departamento jurídico, a Sociedade Empresária constituiu uma provisão no valor\nde R$5.000.000 nas demonstrações de 2023 e impetrou recurso administrativo ao referido órgão. Em\n15/03/2024, o recurso da Sociedade Empresária foi julgado e o órgão fiscal determinou que a Sociedade\nEmpresária recolhesse a quantia de R$6.000.000. A Sociedade Empresária optou por não recorrer da\ndecisão. A elaboração das demonstrações contábeis foi finalizada pelo Departamento Contábil em\n28/02/2024 e o Conselho de Administração autorizou a emissão de tais demonstrações em 25/03/2024.\nInstado a decidir se a Sociedade Empresária XXX deve ajustar as Demonstrações Contábeis de 2023 e por\nqual valor, você declara, corretamente, que a Sociedade Empresária XXX\nA)\t deve ajustar as Demonstrações Contábeis de 2023, reduzindo o lucro do período e aumentando o passivo\nem R$1.000.000.\nB)\t deve ajustar as Demonstrações Contábeis de 2023, reduzindo o lucro do período e aumentando o passivo\nem R$2.000.000.\nC)\t não deve ajustar as Demonstrações Contábeis de 2023, sendo a determinação do órgão fiscal ocorrida depois\nde 31/12/2023.\nD)\t não deve ajustar as Demonstrações Contábeis de 2023, sendo a determinação do órgão fiscal ocorrida depois\nda data de finalização das Demonstrações Contábeis por parte do Departamento Contábil.", "c": "O CPC 24 define que evento subsequente ao período a que se referem as demonstrações contábeis é aquele\nevento, favorável ou desfavorável, que ocorre entre a data final do período a que se referem as demonstrações\ncontábeis e a data na qual é autorizada a emissão dessas demonstrações.\nNo tocante à necessidade de ajuste, tal pronunciamento estabelece o seguinte:\nApós essa introdução, filtremos os trechos chaves do enunciado:\n- Durante o exercício de 2023: provisão fiscal R$ 5.000.000,00.\n- Encerramento do exercício: 28 de fevereiro de 2024.\n- Julgamento desfavorável (sem recurso) e novo valor: 15 de março de 2014; R$ 6.000.000,00.\n- Autorização da divulgação das demonstrações contábeis: 25 de março de 2024.\nAnálise:\nEm 2023, a empresa soube da atuação fiscal e reconheceu uma provisão de R$ 5.000.000,00.\nD - Despesa com provisão fiscal (Conta de resultado: despesa) R$ 5.000.000,00\nC - Provisão Fiscal (Conta patrimonial: passivo) R$ 5.000.000,00\nApós seu julgamento (15/03/24), tal obrigação foi aumentada para R$ 6.000.000.\nO período subsequente terminou em 25 de março de 2024, quando as demonstrações contábeis foram\naprovadas. Como se trata de condição que já existia na data do encerramento das demonstrações contábeis,\ndeve ser efetuado o ajuste de R$ 1.000.000,00 (R$ 6.000.000,00 - R$ 5.000.000,00)\nD - Despesa com provisão fiscal (Conta de resultado: despesa) R$ 1.000.000,00\nC - Provisão Fiscal (Conta patrimonial: passivo) R$ 1.000.000,00\nEfeitos:\n•\t Passivo: aumentou em R$ 1.000.000,00\n•\t Resultado: diminuiu em R$ 1.000.000,00\nEnfim, a empresa deve ajustar as Demonstrações Contábeis de 2023, reduzindo o lucro do período e aumentando\no passivo em R$ 1.000.000.\nGabarito: A", "g": "A"}, {"n": 20, "q": "20.\t (FGV/Exame de Suficiência/2024.1) Em 01/07/2021, uma loja de roupas adquiriu uma máquina de\ncostura por R$840. Na data, estimou que iria usar a máquina durante 4 anos e vendê-la pelo equivalente à\nvista de R$200 após esse período. Em 01/01/2023, a loja constatou que poderia utilizar a máquina por mais\n3 anos, a partir dessa data, mas seu valor residual seria zero. Assinale a opção que indica o valor contábil\nda máquina de costura em 31/12/2023, conforme a NBC TG 27 – Ativo Imobilizado.\nA)\t R$400.\nB)\t R$440.\nC)\t R$320.\nD)\t R$210.", "c": "Nesse quesito, vamos recorrer a nossa receita de bolo:\nComo calcular a depreciação pelo método da linha reta?\n1) Pegue o valor de aquisição: R$ 840,00\n2) Encontre o valor residual: R$ 200,00\n3) Faça a diferença entre o valor de aquisição e o valor residual e encontraremos o chamado valor depreciável.\nR$ 840,00 - R$ 200,00 = R$ 640,00\n4) Encontre a vida útil: 4 anos\n5) Divida o valor depreciável pela vida útil: 640/4 = R$ 160,00\nObs.: de 01/07/2021 até 01/01/2023, temos o intervalo de 1 ano e 6 meses, ou melhor, 18\nmeses ou 1,5 anos.\n6) Depreciação Acumulada (6 meses) = R$ 160,00 x (18/12) = R$ 160,00 x 1,5 = R$ 240,00\nValor Contábil Líquido dessa máquina em 01/01/2023 = R$ 840,00 – R$ 240,00 = R$ 600,00\nTodavia, com as mudanças, o valor residual e a vida útil de um ativo devem ser revisados pelo menos ao final\nde cada ano. Se houver diferença, deve ser realizada e tratada como mudança de estimativa contábil, como reza\no artigo 51 do CPC 27.\nTomem nota! A vida útil e o valor residual agora podem aumentar e diminuir.\nFoi o caso dessa questão, vejam: em 01/01/2023, a loja constatou que poderia utilizar a máquina por mais 3 anos,\na partir dessa data, mas seu valor residual seria zero.\nIsso mesmo, vamos refazer o \"bolo\", mas daqui para frente:\n1) Pegue o valor contábil: R$ 600,00\n2) Encontre o NOVO valor residual: 0\n3) Faça a diferença entre o valor de aquisição e o valor residual e encontraremos o chamado valor depreciável.\nR$ 600,00 - R$ 0,00 = R$ 600,00\n4) Encontre a NOVA vida útil: 3 anos\n5) Divida o valor depreciável pela vida útil: 600/3 = R$ 200,00\nObs.: de 01/01/2023 até 31/12/2023, temos o intervalo de 12 meses ou 1 ano.\n6) Depreciação Acumulada (1 ano) = R$ 200,00 x 1 = R$ 200,00\nValor Contábil Líquido dessa máquina em 31/12/2023 = R$ 600,00 – R$ 200,00 = R$ 400,00\nGabarito: A", "g": "A"}, {"n": 21, "q": "21.\t (FGV/Exame de Suficiência/2024.1) A Sociedade Empresária A possui estoque de um mix de\nmercadorias para revenda e deseja mensurar as mercadorias da categoria b de acordo com a NORMA\nBRASILEIRA DE CONTABILIDADE NBC TG 16 (R2) – ESTOQUES. Em termos unitários, o valor de custo das\nmercadorias dessa categoria é de R$20; o valor realizável líquido é de R$15 e o preço de venda é de R$30.\nConsiderando a quantidade de mil unidades, o seguinte valor dessas mercadorias deve ser apresentado no\nbalanço patrimonial:\nA)\t R$15.\nB)\t R$15.000.\nC)\t R$20.000.\nD)\t R$30.000.", "c": "A questão aborda a mensuração de estoques conforme a NBC TG 16 (R2) – Estoques, que estabelece as regras para\navaliação de itens em estoque no balanço patrimonial. O cenário apresentado envolve a Sociedade Empresária A,\nque possui um estoque de mercadorias da categoria B.\nDe acordo com o item 9 da NBC TG 16 (R2), os estoques devem ser avaliados pelo custo ou valor realizável líquido,\ndos dois o menor.\n9. Os estoques objeto desta Norma devem ser mensurados pelo valor de custo\nou pelo valor realizável líquido, dos dois o menor.\nNa questão, o valor de custo das mercadorias dessa categoria é de R$20; o valor realizável líquido é de R$15, logo\nos estoques serão avaliados por esse valor.\nConsiderando a quantidade de mil unidades, as mercadorias devem ser apresentadas no balanço patrimonial por\n1.000 x 15 = R$ 15.000.\nGabarito: B", "g": "B"}, {"n": 22, "q": "22.\t (FGV/Exame de Suficiência/2024.1) Em 01/01/2022, uma fábrica de cosméticos adquiriu, por\nR$180.000, um terreno para a construção de um estacionamento para seus empregados. Em 31/12/2022,\na fábrica realizou o teste de recuperabilidade desse terreno e constatou que seu valor em uso era de\nR$170.000, enquanto o seu valor justo era de R$190.000. Para vender o terreno, a fábrica deveria incorrer\nem despesas legais de alienação no valor de R$15.000. Assinale o valor do terreno no balanço patrimonial\nda fábrica após o teste de recuperabilidade, conforme a NBC TG 01 – REDUÇÃO AO VALOR RECUPERÁVEL\nDE ATIVOS.\nA)\t R$170.000.\nB)\t R$175.000.\nC)\t R$180.000.\nD)\t R$190.000.", "c": "Em 01/01/2022, vamos reconhecer esse terreno pelo seu custo de R$180.000,00.\nPosteriormente, a entidade realizou o teste de recuperabilidade:\nAdendo! Entre a aquisição e a realização do teste, transcorreu-se 1 ano,\nressaltamos que terrenos, em regra, não são depreciados. Assim, o valor\ncontábil será ainda o valor de custo.\nObservem o item 58 do CPC 27:\n58. Terrenos e edifícios são ativos separáveis e são contabilizados\nseparadamente, mesmo quando sejam adquiridos conjuntamente. Com\nalgumas exceções, como as pedreiras e os locais usados como aterro, os\nterrenos têm vida útil ilimitada e, portanto, não são depreciados. Os edifícios\ntêm vida útil limitada e, por isso, são ativos depreciáveis. O aumento de valor\nde um terreno no qual um edifício esteja construído não afeta o valor contábil\ndo edifício.\n•\t Valor uso = R$ 170.000,00\n•\t Valor realizável líquido = R$190.000 - R$15.000 = R$ 175.000,00\nO valor recuperável é o MAIOR entre o valor justo líquido das despesas de venda e o valor em uso, portanto R$\n175.000,00\nAgora, vamos comparar o valor recuperável com o valor contábil do ativo:\n•\t Valor Contábil = R$ 180.000,00\n•\t Valor Recuperável = R$ 175.000,00\nComo o Valor Recuperável é menor em R$ 5.000 (180.000 – 175.000), a empresa contabiliza um ajuste para\nperdas com Impairment:\nD – Perdas com teste de Recuperabilidade (resultado)\n5.000,00\nC – Ajuste para perda com Recuperabilidade (Ret. Ativo)\n5.000,00\nE o valor contábil (que é o valor evidenciado no Balanço Patrimonial) fica assim:\nValor original\nR$ 180.000,00\n(-) Ajuste para perda com recuperabilidade          -R$ 5.000,00\n= Valor contábil\t                                                 R$ 175.000,00\nDiante do exposto, o valor do terreno no balanço patrimonial da fábrica após o teste de recuperabilidade, é de\nR$ 175.000.\nGabarito: B", "g": "B"}, {"n": 23, "q": "23.\t (FGV/Exame de Suficiência/2024.1) Uma sociedade empresária apresenta saldo de R$80.000 na conta\n“Despesas antecipadas”. Nas Demonstrações contábeis, essa conta é apresentada como\nA)\t ativo, no balanço patrimonial.\nB)\t passivo, no balanço patrimonial.\nC)\t outras despesas, na demonstração do resultado do exercício.\nD)\t despesas operacionais, na demonstração do resultado do exercício.", "c": "A questão aborda o tratamento contábil da conta \"Despesas Antecipadas\", que representa gastos pagos\nantecipadamente pela empresa, mas cujos benefícios econômicos serão usufruídos em períodos futuros, como (I)\nseguros pagos antecipadamente; (II) aluguéis adiantados; ou (III) assinaturas de serviços. O saldo apresentado é de\nR$ 80.000, e o examinador questiona onde essa conta deve ser apresentada nas demonstrações contábeis.\n(A) ativo, no balanço patrimonial.\nAlternativa correta. As despesas antecipadas são classificadas como ativo circulante (quando o benefício\nocorrerá em até 12 meses) ou não circulante (se o prazo for superior). Isso acontece porque representam\nrecursos econômicos futuros (direito a serviços ou benefícios já pagos), atendendo à definição de ativo da NBC\nTG 00 (R2) - Estrutura Conceitual.\n(B) passivo, no balanço patrimonial.\nAlternativa incorreta. Passivos representam obrigações presentes, e despesas antecipadas são direitos, não\nobrigações. Muito cuidado para não confundir com receitas antecipadas, que de fato são passivos, pois\nrepresentam obrigações de entregar produtos/serviços.\n(C) outras despesas, na demonstração do resultado do exercício.\nAlternativa incorreta. A DRE registra despesas incorridas no período. As despesas antecipadas só se tornam\ndespesas na DRE quando o benefício é consumido (por exemplo, à medida que o tempo passa no caso de um\naluguel antecipado). Enquanto não consumidas, são ativos, não despesas.\n(D) despesas operacionais, na demonstração do resultado do exercício.\nAlternativa incorreta. Mesmo raciocínio da alternativa C. Despesas operacionais são registradas na DRE apenas\nquando incorridas, por exemplo, quando o mês do aluguel antecipado efetivamente passa. O valor de R$\n80.000,00 refere-se ao saldo ainda não apropriado (ativo), não a despesas já realizadas.\nGabarito: A", "g": "A"}, {"n": 24, "q": "24.\t (FGV/Exame de Suficiência/2024.1) Considere os seguintes elementos das demonstrações contábeis:\nI. Ativo.\nII. Despesa.\nIII. Receita.\nIV. Passivo.\nV. Patrimônio Líquido.\nDesses elementos os que apresentam natureza devedora são:\nA)\t I e II, apenas.\nB)\t I e III, apenas.\nC)\t II e IV, apenas.\nD)\t I, III e V, apenas.", "c": "•\t Elementos:\nOs elementos diretamente relacionados à mensuração da posição patrimonial e financeira no balanço são os\nativos, os passivos e o patrimônio líquido.\nOs elementos diretamente relacionados com a mensuração do desempenho na demonstração do resultado são\nas receitas e as despesas.\n•\t Natureza\nQuanto à natureza, as contas podem ser classificadas em CONTAS DEVEDORAS OU CREDORAS.\n- Devedoras: aumentam pelo débito e diminuem pelo crédito\nExemplos: Ativo, Retificadoras do Passivo, Retificadoras do PL, Despesas.\nO quesito trouxe os seguintes exemplos: I. Ativo e II. Despesa.\n- Credoras: aumentam pelo crédito e diminuem pelo débito.\nExemplos: Passivo, Patrimônio Líquido, Retificadoras do Ativo e Receitas.\nO quesito trouxe os seguintes exemplos: III. Receita, IV. Passivo e V. Patrimônio Líquido.\nCom base no exposto, desses elementos, os que apresentam natureza devedora são: I e II, apenas.\nGabarito: A", "g": "A"}, {"n": 25, "q": "25.\t (FGV/Exame de Suficiência/2024.1) De acordo com a NBC TG 02 (R3) – EFEITOS DAS MUDANÇAS NAS\nTAXAS DE CÂMBIO E CONVERSÃO DE DEMONSTRAÇÕES CONTÁBEIS, os elementos do balanço patrimonial\npodem ser classificados como monetários e não monetários. Assinale a opção que indica um ativo\nclassificado como ativo não monetário em uma papelaria.\nA)\t Estoques.\nB)\t Contas a receber.\nC)\t Aplicações financeiras.\nD)\t Adiantamento de clientes.", "c": "O item 16 do CPC 02 explica que a característica essencial de item não monetário é a ausência do direito a receber\n(ou da obrigação de entregar) um número fixo ou determinável de unidades de moeda.\nAinda, cita alguns exemplos:\n•\t adiantamento a fornecedores de mercadorias;\n•\t adiantamento a prestadores de serviços;\n•\t goodwill;\n•\t ativos intangíveis;\n•\t estoques;\n•\t imobilizado;\n•\t ativo de direito de uso;\n•\t provisões a serem liquidadas mediante a entrega de ativo não monetário.\nPor outro lado, ensina que a característica essencial de item monetário é o direito a receber (ou a obrigação de\nentregar) um número fixo ou determinável de unidades de moeda.\nAdicionalmente, cita os seguintes exemplos:\n•\t passivos de planos de pensão ou outros benefícios a empregados a serem pagos com caixa;\n•\t provisões que devem ser liquidadas em caixa;\n•\t passivos de arrendamento;\n•\t dividendos a serem distribuídos com caixa, que são reconhecidos como passivos.\n•\t contrato que preveja o direito a receber (ou a obrigação de entregar) um número variável de\ninstrumentos patrimoniais da própria entidade ou uma quantidade variável de ativos, cujo valor justo\na ser recebido (ou a ser entregue) iguala-se ao número fixo ou determinável de unidades de moeda.\nApós essa revisão, julguemos as alternativas:\n(A) Estoques → Ativo Não Monetário\n(B) Contas a receber → Ativo Monetário\n(C) Aplicações financeiras → Ativo Monetário\n(D) Adiantamento de clientes → Ativo Monetário\nGabarito: A", "g": "A"}, {"n": 26, "q": "26.\t (FGV/Exame de Suficiência/2024.1) Em dezembro de 2023, uma empresa de consultoria comprou, à\nvista, aparelhos de ar condicionado, para o seu escritório, por R$6.000. Na data, pagou o frete no valor de\nR$200 e a instalação no valor de R$2.000. Os caixas consumidos, reconhecidos na Demonstração dos Fluxos\nde Caixa da empresa, elaborada pelo método direto, pelas atividades operacional e de investimento, de\nacordo com a NBCTG 03 (R3) – DEMONSTRAÇÕES DOS FLUXOS DE CAIXA, ATIVIDADES DE INVESTIMENTOS,\nsão, respectivamente:\nA)\t zero e R$8.200.\nB)\t R$200 e R$8.000.\nC)\t R$2.000 e R$6.200.\nD)\t R$2.200 e R$6.000.", "c": "Existem três classificações para os fluxos de caixas: operacionais, investimento e financiamento.\nO quesito acabou focando duas:\n•\t Atividade Operacional\nOs fluxos de caixa advindos das atividades operacionais são basicamente derivados das principais atividades\ngeradoras de receita da entidade. Portanto, eles geralmente resultam de transações e de outros eventos que\nentram na apuração do lucro líquido ou prejuízo.\nOs dados apresentados indicam que não houve caixa gerado nem consumido nas atividades operacionais. Isto é,\nfoi zero.\nFica assim:\nAtividade Operacional\nCaixa consumido na atividade operacional R$ 0,00\n•\t Atividade de Investimentos\nA divulgação em separado dos fluxos de caixa advindos das atividades de investimento é importante em função\nde tais fluxos de caixa representarem a extensão em que os dispêndios de recursos são feitos pela entidade com\na finalidade de gerar lucros e fluxos de caixa no futuro. Somente desembolsos que resultam em ativo reconhecido\nnas demonstrações contábeis são passíveis de classificação como atividades de investimento.\nAqui, temos que nos perguntar o seguinte: quanto saiu do caixa?\nAquisição de imobilizado + frete + instalação = R$ 6.000 + R$ 200 + R$ 2.000 = R$ 8.200.\nFica assim:\nAtividade de investimento\nAquisição à vista de novas máquinas                       (R$ 8.200,00)\nCaixa consumido pelas Atividades investimento     (R$ 8.200,00)\nGabarito: A", "g": "A"}, {"n": 27, "q": "27.\t (FGV/Exame de Suficiência/2024.1) Uma sociedade empresária oferece serviços de entrega de\ndocumentos. Para realizar as entregas, possui cinco motos, sendo que cada uma apresentava, em\n31/12/2023, valor contábil de R$30.000. Além disso, a sociedade empresária possui duas motos que são\nutilizadas exclusivamente para a locomoção de seus diretores. Cada uma dessas motos apresentava, em\n31/12/2023, valor contábil de R$50.000. Assinale a opção que indica a apresentação das motos no balanço\npatrimonial da sociedade empresária em 31/12/2023.\nA)\t Investimentos: R$250.000.\nB)\t Ativo Imobilizado: R$250.000.\nC)\t Investimentos: R$100.000 e Ativo Imobilizado: R$150.000.\nD)\t Investimentos: R$150.000 e Ativo Imobilizado: R$100.000.", "c": "Uma sociedade empresária oferece serviços de entrega de documentos. Para realizar as entregas, possui cinco\nmotos, sendo que cada uma apresentava, em 31/12/2023, valor contábil de R$30.000.\nMotos para entregas = 5 motos x R$ 30.000 = R$ 150.000\nTais ativos se enquadram na definição de ativo imobilizado, pois é um ativo usado na prestação de serviços.\nAlém disso, a sociedade empresária possui duas motos que são utilizadas exclusivamente para a locomoção de\nseus diretores. Cada uma dessas motos apresentava, em 31/12/2023, valor contábil de R$50.000.\nMotos para locomoção de seus diretores = 2 motos x R$ 50.000 = R$ 100.000\nNovamente, temos ativos imobilizados. Dessa vez, são vinculados à atividade da empresa (fins administrativos).\nPortanto, ambos são ativos imobilizados e, consequentemente, totalizarão R$ 250.000,00 (150.000 + 100.000) no\nbalanço patrimonial da sociedade empresária em 31/12/2023.\nGabarito: B", "g": "B"}, {"n": 28, "q": "28.\t (FGV/Exame de Suficiência/2024.1) Uma sociedade empresária apresenta a seus usuários externos\nas informações sobre a base de preparação das demonstrações financeiras e das práticas contábeis\nespecíficas selecionadas e aplicadas para negócios e eventos significativos. Conforme a Lei nº 6.404/76,\nessa informação deve ser incluída\nA)\t nas Notas Explicativas.\nB)\t no Relatório do Auditor.\nC)\t no Relatório da Administração.\nD)\t na Carta de Responsabilidade da Administração.", "c": "O enunciado descreveu uma informação apresentada nas Notas Explicativas. Observem o texto dessa lei:\nArt. 176 § 5o As notas explicativas devem: (Redação dada pela Lei nº 11.941,\nde 2009)\nI – apresentar informações sobre a base de preparação das demonstrações\nfinanceiras e das práticas contábeis específicas selecionadas e aplicadas para\nnegócios e eventos significativos; (Incluído pela Lei nº 11.941, de 2009)\nII – divulgar as informações exigidas pelas práticas contábeis adotadas no Brasil\nque não estejam apresentadas em nenhuma outra parte das demonstrações\nfinanceiras; (Incluído pela Lei nº 11.941, de 2009)\nIII – fornecer informações adicionais não indicadas nas próprias demonstrações\nfinanceiras e consideradas necessárias para uma apresentação adequada; e\n(Incluído pela Lei nº 11.941, de 2009)\nIV – indicar: (Incluído pela Lei nº 11.941, de 2009)\na)  os principais critérios de avaliação dos elementos patrimoniais,\nespecialmente estoques, dos cálculos de depreciação, amortização e\nexaustão, de constituição de provisões para encargos ou riscos, e dos ajustes\npara atender a perdas prováveis na realização de elementos do ativo; (Incluído\npela Lei nº 11.941, de 2009)\nb)  os investimentos em outras sociedades, quando relevantes (art. 247,\nparágrafo único); (Incluído pela Lei nº 11.941, de 2009)\nc) o aumento de valor de elementos do ativo resultante de novas avaliações\n(art. 182, § 3o ); (Incluído pela Lei nº 11.941, de 2009)\nd) os ônus reais constituídos sobre elementos do ativo, as garantias prestadas\na terceiros e outras responsabilidades eventuais ou contingentes; (Incluído\npela Lei nº 11.941, de 2009)\ne) a taxa de juros, as datas de vencimento e as garantias das obrigações a\nlongo prazo; (Incluído pela Lei nº 11.941, de 2009)\nf) o número, espécies e classes das ações do capital social; (Incluído pela Lei\nnº 11.941, de 2009)\ng) as opções de compra de ações outorgadas e exercidas no exercício; (Incluído\npela Lei nº 11.941, de 2009)\nh) os ajustes de exercícios anteriores (art. 186, § 1o); e (Incluído pela Lei nº\n11.941, de 2009)\ni) os eventos subsequentes à data de encerramento do exercício que tenham,\nou possam vir a ter, efeito relevante sobre a situação financeira e os resultados\nfuturos da companhia. (Incluído pela Lei nº 11.941, de 2009)\nGabarito: A", "g": "A"}, {"n": 29, "q": "29.\t (FGV/Exame de Suficiência/2024.1) Em 2023, a Demonstração do Resultado do Exercício de uma\nentidade apresentou Receita Líquida de R$200.000 e Lucro Bruto de R$150.000. Pode-se constatar que, na\ndemonstração, a seguinte conta apresenta saldo de R$50.000:\nA)\t despesas de vendas.\nB)\t despesas operacionais.\nC)\t deduções da receita.\nD)\t custo das mercadorias vendidas.", "c": "O Lucro Bruto ou Resultado com Mercadorias é a diferença entre a receita líquida de vendas e o Custo da\nMercadorias Vendidas.\nLucro Bruto = Receita líquida – CMV\nDado que temos Receita Líquida de R$ 200.000 e Lucro Bruto de R$ 150.000, o CMV será de:\n150.000 = 200.000 – CMV\nCMV = 200.000 - 150.000 = 50.000\nEntretanto, para compreender bem essa questão e aprimorar ainda mais seu conhecimento sobre a\nDemonstração do Resultado do Exercício (DRE), é fundamental conhecer sua estrutura, que segue esta\nsequência lógica, de acordo com a Lei nº 6.404/1976:\nDessa forma, torna-se evidente que as outras alternativas apresentadas (despesas de vendas, despesas\noperacionais e deduções da receita) não se encaixam nesse contexto específico. As deduções da receita já\nforam consideradas no cálculo da Receita Líquida (que é a Receita Bruta menos as deduções). Já as despesas\nde vendas e operacionais aparecem na DRE após o cálculo do Lucro Bruto, portanto não interferem nesse\nresultado específico.\nGabarito: D", "g": "D"}, {"n": 30, "q": "30.\t (FGV/Exame de Suficiência/2024.1) Em janeiro de 2024, uma companhia aérea anunciou uma\npromoção especial de Dia das Mães e vendeu, em fevereiro, 200 passagens aéreas do Rio de Janeiro\npara Porto Alegre, por R$300 cada, recebidos à vista. Em maio de 2024, os aeroportos de Porto Alegre\nforam fechados, de modo que a companhia aérea comunicou aos clientes que as passagens poderiam ser\nutilizadas em junho, sem pagamento de taxas e penalidades. Suponha que todos os clientes viajem em\njunho de 2024. Nesse caso, de acordo com a NBC TG 47 – Receita de Contratos com Clientes, a receita da\ncompanhia aérea relativa à venda das 200 passagens deve ser reconhecida no mês de\nA)\t janeiro.\nB)\t fevereiro.\nC)\t maio.\nD)\t junho", "c": "Conforme o pronunciamento técnico CPC 47 – Receita de contrato com cliente:\nSatisfação de obrigação de desempenho\n31. A entidade deve reconhecer receitas quando (ou à medida que) a entidade\nsatisfizer à obrigação de desempenho ao transferir o bem ou o serviço (ou seja,\num ativo) prometido ao cliente. O ativo é considerado transferido quando (ou\nà medida que) o cliente obtiver o controle desse ativo.\nNeste tópico, podemos destacar os seguintes pontos:\n1 – A entidade deve reconhecer receita quando cumprir a obrigação de desempenho ao transferir o bem ou\nserviço ao cliente.\n2 – O ativo é considerado transferido quando o cliente obtiver o controle desse ativo.\nO controle do ativo refere-se à capacidade de determinar o uso do ativo e de obter os benefícios provenientes\ndo ativo.\nEnfim, uma receita deve ser reconhecida (contabilizada) quando a empresa cumpre sua obrigação de performance\npela entrega ou transferência dos bens ou serviços. Assim, no caso narrado no enunciado, a receita deve ser\nreconhecida em junho de 2024, quando o cliente obtém o controle do ativo.\nGabarito: D", "g": "D"}, {"n": 31, "q": "31.\t (FGV/Exame de Suficiência/2024.1) Uma farmácia apresentava os seguintes saldos em seu ativo, em\n31/12/2023:\n• Aplicação financeira com vencimento em 380 dias: R$200.000;\n• Clientes com recebimento previsto para 180 dias: R$140.000;\n• Disponibilidades: R$50.000;\n• Estoque com venda prevista para até 60 dias: R$120.000;\n• Imóvel onde funciona a farmácia: R$600.000;\n• Móveis e utensílios utilizados em suas lojas: R$300.000.\nO ativo circulante da farmácia em 31/12/2023 foi de\nA)\t R$170.000.\nB)\t R$190.000.\nC)\t R$310.000.\nD)\t R$510.000.", "c": "Segundo a Lei 6.404:\nArt. 179. As contas serão classificadas do seguinte modo:\nI - no ativo circulante: as disponibilidades, os direitos realizáveis no curso\ndo exercício social subsequente e as aplicações de recursos em despesas do\nexercício seguinte;\nEssa lei adota como marco temporal a data do encerramento do exercício social. Contudo, se não estivermos\nfalando dessa data, devemos considerar o período de 12 meses.\nCirculante -> até o final do exercício subsequente\nNão Circulante -> Após o final do exercício subsequente em diante\nExercício de X2\nCirculante\nNão circulante\nX3 em diante\n31.12.X2\n31.12.X1\nA exceção fica por conta das transações não usuais com pessoas ligadas (Coligadas, Controladas, Diretores,\nadministradores, sócios, Acionistas ou participantes do lucro). Nesse caso, mesmo que o prazo de recebimento\nseja inferior a 12 meses, estamos diante de um ativo não circulante - realizável a longo prazo.\nO ativo não circulante é composto pelo ativo realizável a longo prazo, investimentos, imobilizado e intangível.\nVejamos suas respectivas definições previstas na lei 6.404/76:\n•\t ativo realizável a longo prazo:\nArt. 179. II - No ativo realizável a longo prazo: os direitos realizáveis após\no término do exercício seguinte, assim como os derivados de vendas,\nadiantamentos ou empréstimos a sociedades coligadas ou controladas (artigo\n243), diretores, acionistas ou participantes no lucro da companhia, que não\nconstituírem negócios usuais na exploração do objeto da companhia;\n•\t investimentos:\nArt. 179. III - em investimentos: as participações permanentes em outras\nsociedades e os direitos de qualquer natureza, não classificáveis no ativo\ncirculante, e que não se destinem à manutenção da atividade da companhia\nou da empresa;\n•\t imobilizado:\nArt. 179. IV – no ativo imobilizado: os direitos que tenham por objeto bens\ncorpóreos destinados à manutenção das atividades da companhia ou da\nempresa ou exercidos com essa finalidade, inclusive os decorrentes de\noperações que transfiram à companhia os benefícios, riscos e controle desses\nbens; (Redação dada pela Lei nº 11.638,de 2007)\n•\t intangível:\nArt. 179. VI – no intangível: os direitos que tenham por objeto bens incorpóreos\ndestinados à manutenção da companhia ou exercidos com essa finalidade,\ninclusive o fundo de comércio adquirido. (Incluído pela Lei nº 11.638, de 2007)\nClassificando, temos:\n•\t Aplicação financeira com vencimento em 380 dias: R$ 200.000 → ANC - Realizável a longo prazo.\n•\t Clientes com recebimento previsto para 180 dias: R$ 140.000 → AC.\n•\t Disponibilidades: R$ 50.000 → AC.\n•\t Estoque com venda prevista para até 60 dias: R$ 120.000 → AC.\n•\t Imóvel onde funciona a farmácia: R$ 600.000 → ANC - Imobilizado.\n•\t Móveis e utensílios utilizados em suas lojas: R$ 300.000 → ANC - Imobilizado.\nApós essa classificação, vamos destacar as contas do ativo circulante:\n•\t Clientes com recebimento previsto para 180 dias: R$ 140.000.\n•\t Disponibilidades: R$ 50.000.\n•\t Estoque com venda prevista para até 60 dias: R$ 120.000.\nPortanto, o ativo circulante da farmácia em 31/12/2023 foi de R$ 310.000.\nGabarito: C", "g": "C"}, {"n": 32, "q": "32.\t (FGV/Exame de Suficiência/2024.1) Uma joalheria reconheceu as seguintes receitas em 2023 com:\n• vendas de mercadorias: R$800.000;\n• financeira: R$400.000;\n• equivalência patrimonial: R$200.000;\n• venda de ativo imobilizado: R$170.000;\n• aluguel de imóvel a terceiros: R$120.000.\nDe acordo cm a NBC TG 09 (R1) – DEMONSTRAÇÃO DO VALOR ADICIONADO, na Demonstração do Valor\nAdicionado da joalheria, em 31/12/2023, o valor adicionado recebido em transferência apresenta o\nseguinte montante:\nA)\t R$490.000.\nB)\t R$600.000.\nC)\t R$720.000.\nD)\t R$890.000.", "c": "Conforme apresentamos, valor adicionado recebido em transferência representa a riqueza que não tenha\nsido criada pela própria entidade, e sim por terceiros, e que a ela é transferida, como receitas financeiras, de\nequivalência patrimonial, dividendos, aluguel, royalties etc. Isso precisa ficar destacado, inclusive para evitar\ndupla-contagem em certas agregações.\nResultado de equivalência patrimonial (MEP) – o resultado da equivalência pode representar receita ou\ndespesa; se despesa, deve ser considerado como redução ou valor negativo.\nReceitas financeiras – inclui todas as receitas financeiras, inclusive as variações de valor justo de instrumentos\nfinanceiros ativos reconhecidas na Demonstração do Resultado do Período e as variações cambiais ativas,\nindependentemente de sua origem.\nOutras transferências recebidas – inclui dividendos relativos a investimentos avaliados ao custo, aluguéis (exceto\nquando se tratar do objeto da entidade), direitos de franquia etc.\nDessa forma, o valor adicionado recebido em transferência foi de R$ 720.000:\n•\t financeira: R$ 400.000;\n•\t equivalência patrimonial: R$ 200.000;\n•\t aluguel de imóvel a terceiros: R$ 120.000.\nNo tocante aos demais itens:\n•\t vendas de mercadorias: R$ 800.000 → receita de venda de mercadorias, produtos e serviços\nrepresenta os valores reconhecidos na contabilidade a esse título pelo regime de competência e\nincluídos na Demonstração do Resultado do Período;\n•\t venda de ativo imobilizado: R$ 170.000 → outras receitas representam os valores que sejam\noriundos, principalmente, de baixas por alienação de ativos não circulantes, tais como resultados na\nvenda de imobilizado, de investimentos e outras transações incluídas na demonstração do resultado\ndo exercício que não configuram reconhecimento de transferência à entidade de riqueza criada por\noutras entidades. Incluem os ajustes (positivos e negativos) de mensuração de ativos não monetários\n(valor justo, valor realizável líquido etc.), tais como ativos biológicos, estoques, propriedades para\ninvestimentos etc. Dessa forma, o item de “outras receitas” pode apresentar sinal negativo e assim\ndeve ser mantido.\nGabarito: C", "g": "C"}, {"n": 33, "q": "33.\t (FGV/Exame de Suficiência/2024.1) De acordo com a Lei no 6.404/76, em uma sociedade empresária,\nas Reservas de Capital poderão ser utilizadas para absorver prejuízos quando\nA)\t não houver ações em tesouraria.\nB)\t estes estiverem acumulados há no mínimo três exercícios sociais.\nC)\t estes ultrapassarem os lucros acumulados e as reservas de lucros.\nD)\t houver garantia de que os dividendos mínimos obrigatórios serão pagos em conformidade.", "c": "As reservas de capital são valores recebidos pela empresa (dos sócios ou de terceiros) que não se configuram\ncomo receita, isto é, não transitam pelo resultado do exercício, sendo contabilizadas diretamente à conta de\nPatrimônio Líquido.\nSão Reserva de Capital: ágio na emissão de ações, produto da alienação de partes beneficiárias e produto da\nalienação de bônus de subscrição.\nConforme previsão do art. 200 da LSA, a reservas de capital podem ter a seguinte utilização:\nArt. 200. As reservas de capital somente poderão ser utilizadas para:\nI - absorção de prejuízos que ultrapassarem os lucros acumulados e as\nreservas de lucros (artigo 189, parágrafo único);\nII - resgate, reembolso ou compra de ações;\nIII - resgate de partes beneficiárias;\nIV - incorporação ao capital social;\nV - pagamento de dividendo a ações preferenciais, quando essa vantagem lhes\nfor assegurada (artigo 17, § 5º).\nParágrafo único. A reserva constituída com o produto da venda de partes\nbeneficiárias poderá ser destinada ao resgate desses títulos.\nGabarito: C", "g": "C"}, {"n": 34, "q": "34.\t (FGV/Exame de Suficiência/2024.1) Em abril de 2024, uma empresa de consultoria adquiriu 10 cadeiras\npara seus funcionários por R$400 cada. Metade do valor foi pago à vista e o restante tem pagamento\nprevisto para junho do mesmo ano. No momento da compra, observam-se as seguintes modificações nos\nsaldos de seus elementos patrimoniais:\nA)\t aumento de R$2.000 no ativo e no passivo.\nB)\t aumento de R$4.000 no ativo e no passivo.\nC)\t aumento de R$4.000 no ativo e no patrimônio líquido.\nD)\t diminuição de R$2.000 no ativo, aumento de R$2.000 no passivo e diminuição de R$4.000 no patrimônio\nlíquido.", "c": "Valor total = 10 cadeiras x R$ 400 = R$ 4.000\nEsse valor foi pago metade em dinheiro e metade a prazo. Consequentemente, o lançamento é o seguinte:\nD - Móveis R$ 4.000 (↑Ativo)\nC - Disponibilidades R$ 2.000 (↓Ativo)\nC - Duplicatas a pagar R$ 2.000 (↑Passivo)\nEfeitos:\n•\t Ativo: + 4.000 - 2.000 = + 2.000\n•\t Passivo: +2.000\n•\t PL = 0\nGabarito: A", "g": "A"}, {"n": 35, "q": "35.\t (FGV/Exame de Suficiência/2024.1) Uma livraria utiliza o critério PEPS (Primeiro a Entrar, Primeiro\na Sair) para mensurar os seus estoques. Em 01/01/2024, havia 20 livros de Contabilidade Avançada em\nestoque, que foram comprados por R$100 cada. Em 05/01/2024, a livraria adquiriu mais 30 unidades desse\nmesmo título, por R$120 cada. Já em 10/01/2024, a livraria vendeu 35 exemplares desse livro a um grupo\nde estudantes, por R$200 cada. De acordo com a NBC TG 16 (R2) – ESTOQUES, o custo das mercadorias\nvendidas reconhecido em janeiro foi de\nA)\t R$3.500.\nB)\t R$3.800.\nC)\t R$4.100.\nD)\t R$4.200.", "c": "O quesito informou adoção do método PEPS. Lembrando que, no PEPS, o primeiro a entrar é o primeiro a sair. Ou\nseja, as mercadorias mais antigas são baixadas primeiro.\nElaboremos a ficha de controle de estoque:\nPEPS\nEntrada\nSaída\nSaldo\nQuantidade\nValor\nSaldo\nQuantidade\nValor\nSaldo\nQuantidade\nValor\nSaldo\nSaldo Inicial\n2.000\nCompra\n3.600\n2.000\n3.600\nVenda\n2.000\n1.800\n1.800\nCMV\n3.800\nEstoque Final\n1.800\nAdendo! Também podemos resolver sem a ficha de controle de estoque. Vejam:\nMétodo = PEPS\nEm 01/01/2024, havia 20 livros de Contabilidade Avançada em estoque, que foram\ncomprados por R$100 cada.\nEI = 20 unidades x R$ 100 = R$ 2.000\nEm 05/01/2024, a livraria adquiriu mais 30 unidades desse mesmo título, por R$120 cada.\nEI = 20 unidades x R$ 100 = R$ 2.000\nCompra 1 = 30 unidades x R$ 120 = R$ 3.600\nJá em 10/01/2024, a livraria vendeu 35 exemplares desse livro a um grupo de estudantes,\npor R$200 cada.\nSaídas (CMV):\n(EI = 20 unidades x R$ 100 = R$ 2.000)\n(Compra 1 = 15 unidades x R$ 120 = R$ 1.800\nCMV = 2.000 + R$ 1.800 = R$ 3.800\nGabarito: B", "g": "B"}, {"n": 36, "q": "36.\t (FGV/Exame de Suficiência/2024.1) Conforme a Lei no 6.404/76, no Balanço Patrimonial, as contas do\nativo são apresentadas de acordo com a ordem decrescente de grau de\nA)\t liquidez.\nB)\t relevância.\nC)\t objetividade.\nD)\t valor monetário.", "c": "A referida norma ensina que o ativo é disposto em ordem DECRESCENTE do grau de liquidez.\nA liquidez refere-se à expectativa de conversão em dinheiro de um bem ou direito. Dessa forma, começaremos a\nexpor as contas no ativo pela maior conversibilidade em dinheiro, ou seja, pela conta caixa, que já representa\no próprio numerário. Em seguida, classificaremos a conta bancos, aplicações financeiras de liquidez imediata e\nassim por diante, até a conta terrenos ou outra que tenha baixíssima liquidez.\nObservem o parágrafo 1 do art. 178 dessa lei:\nArt. 178. No balanço, as contas serão classificadas segundo os elementos do\npatrimônio que registrem, e agrupadas de modo a facilitar o conhecimento e\na análise da situação financeira da companhia.\n§ 1º No ativo, as contas serão dispostas em ordem decrescente de grau de\nliquidez dos elementos nelas registrados, nos seguintes grupos:\nI – ativo circulante; e\nII – ativo não circulante, composto por ativo realizável a longo prazo,\ninvestimentos, imobilizado e intangível.\nGabarito: A", "g": "A"}, {"n": 37, "q": "37.\t (FGV/Exame de Suficiência/2024.1) A Euza Batista Modas é uma indústria têxtil que confecciona\napenas calças. No mês de maio de 2024, apresentou os seguintes dados a respeito da sua produção\nA gestora da companhia tem por costume utilizar o método de custo padrão para tomar suas decisões.\nA partir dos dados apresentados, assinale a principal conclusão a respeito da variação dos insumos de\nprodução.\nA)\t Todas as variações foram desfavoráveis.\nB)\t Todas as variações de quantidade foram desfavoráveis.\nC)\t As variações de custo unitário dos itens botão e linha foram desfavoráveis.\nD)\t O tecido jeans foi o único insumo da produção que teve variações favoráveis.", "c": "Vamos resolver com o método XI:\nO cálculo das variações de quantidade e preço formam um X. E o cálculo da variação mista forma um I.\nPara dificultar, a banca trouxe três itens:\n•\t Tecido jeans\nTecido jeans\nReal\nPadrão\nDiferença\nQuantidade\n2,0\n1,50\n0,5\nPreço\n55,0\n45,0\n10,0\nTotal\n110,0\n67,50\n-42,50\nCálculo das variações:\nVariação quantidade: 0,5 x 45,0 = 22,50 (Desfavorável)\nVariação de preço: 10,0 x 1,50 = 15,0 (Desfavorável)\nVariação mista: 0,5 x 10,0 = 5 (Desfavorável)\n•\t Botão\nBotão\nReal\nPadrão\nDiferença\nQuantidade\n6,00\n3,00\nPreço\n5,47\n6,55\n-1,08\nTotal\n32,82\n19,65\n13,17\nCálculo das variações:\nVariação quantidade: 3 x 6,55 = 19,65 (Desfavorável)\nVariação de preço: -1,08 x 3,00 = - 3,24 (Favorável)\nVariação mista: -1,08 x 3,0 = - 3,24 (Favorável)\n•\t Linha\nLinha\nReal\nPadrão\nDiferença\nQuantidade\n290,00\n220,00\n70,00\nPreço\n0,11\n0,15\n-0,04\nTotal\n31,90\n33,00\n-1,10\nCálculo das variações:\nVariação quantidade: 0,15 x 70,00 = 10,50 (Desfavorável)\nVariação de preço: -0,04 x 220,00 = - 8,80 (Favorável)\nVariação mista: -0,04 x 70,0 = - 2,80 (Favorável)\nApós esses cálculos, vamos julgar as alternativas:\n(A) Todas as variações foram desfavoráveis.\nFalso, pois tanto botão quanto linha apresentaram variações de preço favoráveis.\n(B) Todas as variações de quantidade foram desfavoráveis.\nFiltremos esses dados:\nTecido → variação quantidade: 0,5 x 45,0 = 22,50. Desfavorável.\nBotão → variação quantidade: 3 x 6,55 = 19,65. Desfavorável.\nLinha→ variação quantidade: 0,15 x 70,00 = 10,50. Desfavorável.\nObserva-se que todas as variações de quantidade foram desfavoráveis. Esse é nosso gabarito.\n(C) As variações de custo unitário dos itens botão e linha foram desfavoráveis.\nFiltremos esses dados:\nBotão → variação de preço: -1,08 x 3,00 = - 3,24 (Favorável).\nLinha→ variação de preço: -0,04 x 220,00 = - 8,80 (Favorável).\nNa realidade, elas foram favoráveis. Alternativa errada.\n(D) O tecido jeans foi o único insumo da produção que teve variações favoráveis.\nVerdade seja dita: o tecido jeans foi o único insumo de produção que só teve variações desfavoráveis.\nOs demais apresentaram variações favoráveis. Alternativa errada.\nGabarito: B", "g": "B"}, {"n": 38, "q": "38.\t (FGV/Exame de Suficiência/2024.1) Uma sociedade empresária apresentou os seguintes saldos em\nseu Balanço Patrimonial em 31/12/2023:\n• Capital Social: 180.000;\n• Disponibilidades: 80.000;\n• Empréstimos a pagar a Longo Prazo: 150.000;\n• Estoques: 20.000;\n• Fornecedores a pagar: 70.000;\n• Imobilizado: 130.000;\n• Realizável a Longo Prazo: 170.000.\nConsiderando apenas os saldos dessas contas, a liquidez corrente aproximada da sociedade empresária\nem 31/12/2023 foi\nA)\t 1,14.\nB)\t 1,23.\nC)\t 1,43.\nD)\t 1,82.", "c": "Inicialmente, classifiquemos as contas conforme o grupo patrimonial a que pertencem:\n•\t Ativo Circulante = 100.000,00\nDisponibilidades: 80.000;.\nEstoques: 20.000.\n•\t Ativo Não Circulante = 300.000,00\nImobilizado: 130.000.\nRealizável a Longo Prazo: 170.000.\n•\t Passivo Circulante = 70.000,00\nFornecedores a pagar: 70.000.\n•\t Passivo Não Circulante = 150.000,00\nEmpréstimos a pagar a Longo Prazo: 150.000.\n•\t PL = 180.000,00\nCapital Social: 180.000.\nApós esses cálculos preliminares, vamos calcular o índice de liquidez:\nO Índice de Liquidez Corrente (também conhecido como Liquidez Comum) mede a capacidade da empresa de\npagar suas dívidas de curto prazo (passivo circulante) com os recursos de curto prazo (ativo circulante). É um\níndice muito utilizado e considerado como o melhor indicador da situação de liquidez da empresa.\nLiquidez corrente = Ativo circulante / Passivo circulante = 100.000 / 70.000 = 1,428 ≅ 1,43\nSe a LC da empresa for de 1,43 ou 143%, podemos dizer que a empresa possui R$ 1,43 reais no ativo circulante\npara cada real de dívida, a curto prazo.\nGabarito: C", "g": "C"}, {"n": 39, "q": "39.\t (FGV/Exame de Suficiência/2024.1) Observe a seguinte definição: Conceito fundamental de finanças\ne economia que diz respeito aos benefícios que podem ser perdidos quando uma opção é escolhida em\ndetrimento de outra; em outras palavras, ele representa o valor da melhor opção a ser considerada após a\ntomada de decisão. A definição é referente a\nA)\t Custo Controlável.\nB)\t Custo de Oportunidade.\nC)\t Custo Perdido.\nD)\t Custos Imputados.", "c": "A questão aborda um conceito fundamental de finanças e economia que se refere aos benefícios perdidos\nquando uma alternativa é escolhida em detrimento de outra. Esse conceito é amplamente utilizado na análise de\ndecisões econômicas e financeiras, tanto por empresas quanto por indivíduos.\nDesse modo, vamos analisar cada alternativa e identificar qual é a correta.\n(A) Custo Controlável.\nAlternativa incorreta. Refere-se a custos que podem ser diretamente influenciados por um gestor em um\ndeterminado período, por exemplo, gastos com marketing ou
